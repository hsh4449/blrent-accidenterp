name: IMS 사고대차 일일 크롤링

on:
  # 2026-05-27 — schedule cron 비활성화 (Vultr cron 으로 이전).
  # 사유: GitHub Actions schedule cron 이 5-21, 5-27 두 번이나 17~20시간 통째로 skip.
  # 17분 분산해도 무력. Vultr crontab `17 9-17 * * *` (KST 09:17~17:17 영업시간) 가 운영중.
  # 주의: Vultr 서버 timezone = KST. crontab 의 시각은 KST 로 해석됨 (UTC 아님).
  # workflow_dispatch 만 백업 유지.
  workflow_dispatch: # 수동 실행 (백업용)

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase

      - name: Run crawler
        env:
          IMS_ID: ${{ secrets.IMS_ID }}
          IMS_PW: ${{ secrets.IMS_PW }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python crawler.py
