name: IMS 사고대차 일일 크롤링

on:
  schedule:
    # KST 09:17 ~ 17:17 매시 17분 (UTC 00:17 ~ 08:17, KST = UTC+9)
    # 9개 시각: KST 09:17, 10:17, ..., 17:17
    # 2026-05-22 — 0분 정각은 GitHub Actions 글로벌 runner 큐 밀림으로 자주 skip됨
    # (실제 5-21 17:40 이후 17.9시간 통째로 skip 사례). 17분 으로 분산.
    - cron: '17 0-8 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase

      - name: Run crawler
        env:
          IMS_ID: ${{ secrets.IMS_ID }}
          IMS_PW: ${{ secrets.IMS_PW }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python crawler.py
