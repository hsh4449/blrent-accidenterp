name: IMS 사고대차 일일 크롤링

on:
  schedule:
    # KST 09:00 ~ 17:00 매시 정각 (UTC 00:00 ~ 08:00, KST = UTC+9)
    # 9개 시각: KST 09, 10, 11, 12, 13, 14, 15, 16, 17
    # GitHub Actions cron 은 5~15분 지연 가능.
    - cron: '0 0-8 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase

      - name: Run crawler
        env:
          IMS_ID: ${{ secrets.IMS_ID }}
          IMS_PW: ${{ secrets.IMS_PW }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python crawler.py
