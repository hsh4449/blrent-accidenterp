// ── Parse IMS Excel (2-row pairs) ──
function parseIMSExcel(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
  const out = [];
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    if (r[0] === "연번" || !r[1]) continue;
    const ims = String(r[1]).trim();
    if (!ims || ims === "null" || ims === "undefined") continue;
    const dr = (i+1 < rows.length) ? rows[i+1] : [];
    const pv = v => { if (v == null || v === "-" || v === "") return null; return String(v).trim(); };
    const pd = v => {
      if (!v || v === "-") return null;
      const s = String(v).trim();
      let m = s.match(/^(\d{4})\.(\d{2})\.(\d{2})$/);
      if (m) return `${m[1]}-${m[2]}-${m[3]}`;
      m = s.match(/^(\d{2})\.(\d{2})\.(\d{2})$/);
      if (m) return `${parseInt(m[1])<50?"20":"19"}${m[1]}-${m[2]}-${m[3]}`;
      return null;
    };
    const pt = v => {
      if (!v) return null;
      if (typeof v === "object" && v.getHours) return `${String(v.getHours()).padStart(2,"0")}:${String(v.getMinutes()).padStart(2,"0")}`;
      if (typeof v === "number") { const t=Math.round(v*1440); return `${String(Math.floor(t/60)%24).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`; }
      return String(v);
    };
    const pm = v => { if (!v || v === "-") return 0; const n=parseInt(String(v).replace(/\D/g,"")); return isNaN(n)?0:n; };
    out.push({
      id:ims, status:pv(r[2])||"배차중", dispatcher:pv(r[3])||"-",
      startDate:pd(r[4]), startTime:pt(dr[4]), endDate:pd(r[5]), endTime:pt(dr[5]),
      billingDate:pd(r[6]), billingTime:pt(dr[6]), depositDate:pd(r[7]),
      vehicleModel:pv(r[8])||"", vehicleNumber:pv(dr[8])||"",
      customerName:pv(r[9])||"", customerVehicle:pv(r[10])||"", customerNumber:pv(dr[10])||"",
      customerPhone:pv(r[11])||"", fault:pv(r[12])||"-",
      insurer:pv(r[13])||"-", billingTo:pv(r[14])||"-", receiptNo:pv(r[15])||"",
      salesRep:pv(r[16])||"-", retriever:pv(r[17])||"-", referrer:pv(r[18])||"-",
      repairShop:pv(r[19])||"-", billingAmount:pm(r[20]), rentalFee:pm(r[21]),
    });
    i++;
  }
  return out;
}

function mergeContracts(existing, incoming) {
  const map = new Map();
  existing.forEach(c => map.set(c.id, c));
  let added=0, updated=0;
  incoming.forEach(c => { if(map.has(c.id)) updated++; else added++; map.set(c.id, c); });
  return { merged: Array.from(map.values()), added, updated };
}

// ── Export to Excel ──
function exportToExcel(contracts) {
  const headers = ["IMS번호","상태","배차자","배차일","배차시간","반납일","반납시간","청구일","입금일","대여차종","차량번호","고객명","고객차종","고객번호판","연락처","과실","보험사","청구처","접수번호","청구금","대여료","대여일수"];
  const rows = contracts.map(c => [
    c.id, c.status, c.dispatcher, c.startDate||"", c.startTime||"", c.endDate||"", c.endTime||"",
    c.billingDate||"", c.depositDate||"", c.vehicleModel, c.vehicleNumber,
    c.customerName, c.customerVehicle, c.customerNumber, c.customerPhone,
    c.fault, c.insurer, c.billingTo, c.receiptNo,
    c.billingAmount||0, c.rentalFee||0, daysBetween(c.startDate, c.endDate)
  ]);
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  // Set column widths
  ws['!cols'] = [
    {wch:10},{wch:10},{wch:8},{wch:12},{wch:8},{wch:12},{wch:8},
    {wch:12},{wch:12},{wch:14},{wch:12},{wch:8},{wch:16},{wch:12},
    {wch:14},{wch:8},{wch:10},{wch:10},{wch:18},{wch:12},{wch:12},{wch:8}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "사고대차");
  XLSX.writeFile(wb, `사고대차_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function Modal({ open, onClose, title, children, width=560 }) {
  if (!open) return null;
  return (
    <div style={{ position:"fixed", inset:0, zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }} onClick={onClose}>
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.5)", backdropFilter:"blur(4px)" }}/>
      <div onClick={e=>e.stopPropagation()} style={{ position:"relative", background:"#1a1a2e", border:"1px solid #2a2a4a", borderRadius:16, width, maxWidth:"95vw", maxHeight:"90vh", overflow:"auto", padding:28, boxShadow:"0 24px 48px rgba(0,0,0,.4)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <h3 style={{ margin:0, fontSize:18, color:"#e0e0e0" }}>{title}</h3>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#666", fontSize:22, cursor:"pointer", lineHeight:1 }}>x</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return <div style={{ marginBottom:14 }}><label style={{ display:"block", fontSize:11, color:"#888", marginBottom:4 }}>{label}</label>{children}</div>;
}

function EditableAmount({ value, onSave }) {
  const [editing, setEditing] = useState(false);
  const [v, setV] = useState(value);
  useEffect(() => { setV(value); }, [value]);
  const commit = () => { setEditing(false); const n=Number(v)||0; if (n !== value) onSave(n); };
  if (editing) {
    return <input type="number" autoFocus value={v} onChange={e=>setV(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setV(value);setEditing(false);}}} style={{width:90,padding:"4px 6px",background:"#0f0f23",border:"1px solid #3b82f6",borderRadius:4,color:"#e0e0e0",fontSize:12,textAlign:"right",fontVariantNumeric:"tabular-nums",outline:"none"}}/>;
  }
  return <span onClick={()=>setEditing(true)} style={{cursor:"pointer",display:"inline-block",padding:"4px 8px",borderRadius:4,background:value?"#1e1e3f":"transparent",fontVariantNumeric:"tabular-nums",minWidth:60,textAlign:"right",color:value?"#e0e0e0":"#555"}} title="클릭해서 편집">{value ? fmt(value) : "입력"}</span>;
}

const IS = { width:"100%", padding:"8px 12px", background:"#0f0f23", border:"1px solid #2a2a4a", borderRadius:8, color:"#e0e0e0", fontSize:13, outline:"none", boxSizing:"border-box" };
const SS = { ...IS, appearance:"auto" };

function Toast({ msg, type, onDone }) {
  useEffect(() => { const t=setTimeout(onDone,3000); return ()=>clearTimeout(t); }, [onDone]);
  return (
    <div style={{ position:"fixed", top:20, right:20, zIndex:2000, background:type==="success"?"#065f46":"#991b1b", color:"#fff", padding:"12px 20px", borderRadius:10, fontSize:13, fontWeight:500, boxShadow:"0 8px 24px rgba(0,0,0,.3)", animation:"si .2s" }}>
      {msg}
      <style>{`@keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}`}</style>
    </div>
  );
}

// ════════════════════════════════════════
function App() {
  const [contracts, setContracts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("dashboard");
  const [filter, setFilter] = useState({ status:"all", vehicle:"all", search:"", depositMonth:"all" });
  const [selected, setSelected] = useState(null);
  const [editModal, setEditModal] = useState(false);
  const [editData, setEditData] = useState(null);
  const [toast, setToast] = useState(null);
  const [schedMonth, setSchedMonth] = useState(() => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`; });
  const [settlMonth, setSettlMonth] = useState(() => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`; });
  const [gapMonth, setGapMonth] = useState("all");
  const [monthlyFixed, setMonthlyFixed] = useState({}); // key: "vehicleNumber|YYYY-MM" -> {installment, insurance, etc_cost, etc_note}
  const fileRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const [{ data: rentals, error: e1 }, { data: fixed, error: e2 }] = await Promise.all([
          supabaseClient.from('accident_rentals').select('*').order('start_date', { ascending: false }),
          supabaseClient.from('vehicle_monthly_fixed').select('*'),
        ]);
        if (e1) throw e1;
        if (e2) throw e2;
        setContracts(rentals.map(fromDbRow));
        const mf = {};
        (fixed||[]).forEach(r => { mf[`${r.vehicle_number}|${r.year_month}`] = { installment: r.installment||0, insurance: r.insurance||0, etc_cost: r.etc_cost||0, etc_note: r.etc_note||"" }; });
        setMonthlyFixed(mf);
      } catch(e) {
        console.error('Supabase load error:', e);
        setContracts(INITIAL_DATA);
      }
      setLoading(false);
    })();
  }, []);

  // 월별 고정비 저장 (차량×월)
  const saveMonthlyFixed = useCallback(async (vehicleNumber, ym, patch) => {
    const key = `${vehicleNumber}|${ym}`;
    const prev = monthlyFixed[key] || { installment:0, insurance:0, etc_cost:0, etc_note:"" };
    const next = { ...prev, ...patch };
    setMonthlyFixed(p => ({ ...p, [key]: next }));
    const { error } = await supabaseClient.from('vehicle_monthly_fixed').upsert({
      vehicle_number: vehicleNumber, year_month: ym,
      installment: next.installment, insurance: next.insurance,
      etc_cost: next.etc_cost, etc_note: next.etc_note,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'vehicle_number,year_month' });
    if (error) { console.error(error); setToast({msg:"저장 실패: "+error.message, type:"error"}); }
  }, [monthlyFixed]);

  const save = useCallback(async d => { setContracts(d); }, []);

  // Dynamic vehicles from data
  const vehicles = useMemo(() => {
    const m = new Map();
    contracts.forEach(c => { if(c.vehicleNumber && !m.has(c.vehicleNumber)) m.set(c.vehicleNumber, c.vehicleModel); });
    return Array.from(m.entries()).map(([num,model],i) => ({ model, number:num, color:VCOLORS[i%VCOLORS.length] }));
  }, [contracts]);

  // File import
  const onImport = useCallback(async e => {
    const f = e.target.files?.[0]; if(!f) return; e.target.value="";
    try {
      const buf = await f.arrayBuffer();
      const wb = XLSX.read(buf, { type:"array", cellDates:true });
      const inc = parseIMSExcel(wb);
      if (!inc.length) { setToast({msg:"파싱할 수 있는 데이터가 없습니다. IMS 엑셀 형식을 확인해주세요.",type:"error"}); return; }
      const {merged,added,updated} = mergeContracts(contracts, inc);
      const { error } = await supabaseClient.from('accident_rentals').upsert(merged.map(toDbRow));
      if (error) throw error;
      setContracts(merged);
      setToast({msg:`완료: 신규 ${added}건, 업데이트 ${updated}건 (총 ${merged.length}건)`, type:"success"});
    } catch(err) { setToast({msg:"파일 오류: "+err.message, type:"error"}); }
  }, [contracts, save]);

  // Stats
  const stats = useMemo(() => {
    const active = contracts.filter(c=>c.status==="배차중").length;
    const pending = contracts.filter(c=>c.status==="청구전").length;
    const totalBill = contracts.reduce((s,c)=>s+(c.billingAmount||0),0);
    const deposited = contracts.filter(c=>c.depositDate);
    const totalDep = contracts.reduce((s,c)=>s+(c.rentalFee||0),0);
    const totalRentalFee = totalDep;
    const unpaid = totalBill - totalDep;
    const profitRate = totalBill > 0 ? Math.round(totalDep / totalBill * 1000) / 10 : 0;
    const monthly = {};
    contracts.forEach(c => { if(!c.startDate) return; const ym=c.startDate.slice(0,7); if(!monthly[ym]) monthly[ym]={bill:0,dep:0,cnt:0}; monthly[ym].bill+=(c.billingAmount||0); monthly[ym].dep+=(c.rentalFee||0); monthly[ym].cnt++; });
    const vStats = {};
    contracts.forEach(c => { const k=c.vehicleNumber; if(!k) return; if(!vStats[k]) vStats[k]={model:c.vehicleModel,cnt:0,bill:0,dep:0,rental:0,days:0}; vStats[k].cnt++; vStats[k].bill+=(c.billingAmount||0); vStats[k].dep+=(c.rentalFee||0); vStats[k].rental+=(c.rentalFee||0); vStats[k].days+=daysBetween(c.startDate,c.endDate); });
    return { active, pending, totalBill, totalDep, totalRentalFee, unpaid, profitRate, monthly, vStats, total:contracts.length, depCount:deposited.length };
  }, [contracts]);

  const sortedMonths = useMemo(() => Object.entries(stats.monthly).sort((a,b)=>a[0].localeCompare(b[0])), [stats.monthly]);
  const maxMA = useMemo(() => Math.max(...sortedMonths.map(([,d])=>d.bill),1), [sortedMonths]);

  // 입금월 목록 (depositDate 기준)
  const depositMonths = useMemo(() => {
    const ms = new Set();
    contracts.forEach(c => {
      if (c.depositDate) ms.add(c.depositDate.slice(0,7));
    });
    return Array.from(ms).sort();
  }, [contracts]);

  const filtered = useMemo(() => {
    let l = [...contracts];
    if(filter.status!=="all") l=l.filter(c=>c.status===filter.status);
    if(filter.vehicle!=="all") l=l.filter(c=>c.vehicleNumber===filter.vehicle);
    if(filter.depositMonth!=="all") {
      if(filter.depositMonth==="none") l=l.filter(c=>!c.depositDate);
      else l=l.filter(c=>c.depositDate&&c.depositDate.startsWith(filter.depositMonth));
    }
    if(filter.search){const s=filter.search.toLowerCase(); l=l.filter(c=>c.customerName?.toLowerCase().includes(s)||c.id?.includes(s)||c.receiptNo?.toString().includes(s)||c.insurer?.toLowerCase().includes(s)||c.vehicleModel?.toLowerCase().includes(s));}
    return l.sort((a,b)=>(b.startDate||"").localeCompare(a.startDate||""));
  }, [contracts, filter]);

  const sched = useMemo(() => {
    const [y,m]=schedMonth.split("-").map(Number);
    const dim=new Date(y,m,0).getDate(), f=new Date(y,m-1,1), la=new Date(y,m-1,dim,23,59,59);
    const vs={};
    contracts.forEach(c=>{
      const st=c.startDate?new Date(c.startDate):null, en=c.endDate?new Date(c.endDate):new Date(2099,0,1);
      if(!st||st>la||en<f) return;
      const k=c.vehicleNumber; if(!k) return;
      if(!vs[k]) vs[k]={model:c.vehicleModel,number:k,entries:[]};
      vs[k].entries.push({...c, bs:Math.max(1,st<f?1:st.getDate()), be:Math.min(dim,en>la?dim:en.getDate())});
    });
    return {dim,vs:Object.values(vs),y,m};
  }, [contracts, schedMonth]);

  const doSave = useCallback(async d => {
    try {
      const { error } = await supabaseClient.from('accident_rentals').upsert(toDbRow(d));
      if (error) throw error;
      const updated = contracts.filter(c=>c.id!==d.id).concat(d);
      setContracts(updated);
      setEditModal(false); setEditData(null);
      setToast({msg:"저장 완료",type:"success"});
    } catch(e) {
      setToast({msg:"저장 실패: "+e.message,type:"error"});
    }
  }, [contracts]);
  const doDelete = useCallback(async id => {
    if(!confirm("삭제하시겠습니까?")) return;
    try {
      const { error } = await supabaseClient.from('accident_rentals').delete().eq('id', id);
      if (error) throw error;
      setContracts(contracts.filter(c=>c.id!==id));
      setSelected(null);
      setToast({msg:"삭제됨",type:"success"});
    } catch(e) {
      setToast({msg:"삭제 실패: "+e.message,type:"error"});
    }
  }, [contracts]);
  const doReset = useCallback(async () => {
    if(!confirm("초기 데이터로 리셋합니다. (DB 전체 교체)")) return;
    try {
      await supabaseClient.from('accident_rentals').delete().neq('id', '');
      const { error } = await supabaseClient.from('accident_rentals').insert(INITIAL_DATA.map(toDbRow));
      if (error) throw error;
      setContracts(INITIAL_DATA);
      setToast({msg:"리셋 완료",type:"success"});
    } catch(e) {
      setToast({msg:"리셋 실패: "+e.message,type:"error"});
    }
  }, []);

  if(loading) return <div style={{minHeight:"100vh",background:"#0f0f23",display:"flex",alignItems:"center",justifyContent:"center",color:"#e0e0e0",fontFamily:"'Pretendard',sans-serif"}}><div style={{textAlign:"center"}}><div style={{fontSize:32,marginBottom:8}}>BL</div><div style={{fontSize:13,color:"#888"}}>로딩 중...</div></div></div>;

  return (
    <div style={{ minHeight:"100vh", background:"#0f0f23", color:"#e0e0e0", fontFamily:"'Pretendard',-apple-system,sans-serif" }}>
      <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={onImport}/>

      <header style={{ borderBottom:"1px solid #1a1a3a", padding:"10px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", background:"#12122a" }}>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <div style={{ background:"linear-gradient(135deg,#3b82f6,#8b5cf6)", borderRadius:8, width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12, color:"#fff" }}>BL</div>
          <span style={{ fontSize:14, fontWeight:700 }}>사고대차 관리</span>
          <span style={{ fontSize:11, color:"#555" }}>{contracts.length}건</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <button onClick={()=>fileRef.current?.click()} style={{ padding:"7px 14px", background:"linear-gradient(135deg,#3b82f6,#6366f1)", color:"#fff", border:"none", borderRadius:8, fontSize:11.5, fontWeight:600, cursor:"pointer" }}>+ 엑셀 업로드</button>
          <button onClick={()=>exportToExcel(filtered)} style={{ padding:"7px 14px", background:"linear-gradient(135deg,#10b981,#059669)", color:"#fff", border:"none", borderRadius:8, fontSize:11.5, fontWeight:600, cursor:"pointer" }}>엑셀 다운로드</button>
          <nav style={{ display:"flex", gap:1, marginLeft:8 }}>
            {[["dashboard","대시보드"],["contracts","계약내역"],["settlement","정산"],["schedule","스케줄"]].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{ padding:"7px 14px", borderRadius:8, border:"none", cursor:"pointer", fontSize:12, fontWeight:tab===k?600:400, background:tab===k?"#1e1e3f":"transparent", color:tab===k?"#e0e0e0":"#777" }}>{l}</button>
            ))}
          </nav>
        </div>
      </header>

      <main style={{ padding:"20px 24px", maxWidth:1320, margin:"0 auto" }}>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard" && <div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))", gap:12, marginBottom:24 }}>
            {[
              {l:"배차중",v:stats.active,u:"건",a:"#f59e0b"},
              {l:"청구전",v:stats.pending,u:"건",a:"#3b82f6"},
              {l:"총 청구금",v:fmt(stats.totalBill),u:"원",a:"#10b981"},
              {l:"총 입금액",v:fmt(stats.totalDep),u:"원",a:"#8b5cf6"},
              {l:"차액",v:fmt(stats.unpaid),u:"원",a:"#ef4444"},
              {l:"수익률",v:`${stats.profitRate}`,u:"%",a:"#06b6d4"},
            ].map((s,i)=>(
              <div key={i} style={{ background:"#161630", border:"1px solid #1e1e3f", borderRadius:12, padding:"16px 18px", borderLeft:`3px solid ${s.a}` }}>
                <div style={{ fontSize:11, color:"#888", marginBottom:6 }}>{s.l}</div>
                <div style={{ fontSize:22, fontWeight:700, fontVariantNumeric:"tabular-nums" }}>{s.v}<span style={{ fontSize:11, color:"#888", marginLeft:3 }}>{s.u}</span></div>
              </div>
            ))}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
            {/* Monthly Deposits */}
            <div style={{ background:"#161630", border:"1px solid #1e1e3f", borderRadius:12, padding:20 }}>
              <h4 style={{ margin:"0 0 16px", fontSize:13, fontWeight:600 }}>월별 청구/입금 현황</h4>
              {sortedMonths.length===0 ? <div style={{padding:24,textAlign:"center",color:"#555",fontSize:12}}>데이터 없음</div> :
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {sortedMonths.map(([ym,d])=>{ const [y,m]=ym.split("-"); return (
                  <div key={ym}>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:4 }}>
                      <span style={{color:"#aaa"}}>{y}년 {parseInt(m)}월 <span style={{color:"#666"}}>({d.cnt}건)</span></span>
                      <span style={{fontVariantNumeric:"tabular-nums"}}><span style={{fontWeight:700}}>{fmt(d.bill)}</span><span style={{color:"#888"}}> / {fmt(d.dep)}원</span></span>
                    </div>
                    <div style={{ height:20, background:"#0f0f23", borderRadius:6, overflow:"hidden", position:"relative" }}>
                      <div style={{ position:"absolute", height:"100%", width:`${d.bill/maxMA*100}%`, background:"#2a2a4a", borderRadius:6 }}/>
                      <div style={{ position:"absolute", height:"100%", width:`${d.dep/maxMA*100}%`, background:"linear-gradient(90deg,#8b5cf6,#6366f1)", borderRadius:6 }}/>
                    </div>
                  </div>
                );})}
                <div style={{ borderTop:"1px solid #1e1e3f", paddingTop:10, display:"flex", justifyContent:"space-between", fontSize:12 }}>
                  <span style={{color:"#888"}}>누적</span>
                  <span style={{fontVariantNumeric:"tabular-nums"}}><span style={{fontWeight:700,color:"#10b981"}}>{fmt(stats.totalBill)}</span><span style={{color:"#888"}}> / </span><span style={{fontWeight:700,color:"#8b5cf6"}}>{fmt(stats.totalDep)}원</span></span>
                </div>
              </div>}
            </div>
            {/* Vehicle Stats */}
            <div style={{ background:"#161630", border:"1px solid #1e1e3f", borderRadius:12, padding:20 }}>
              <h4 style={{ margin:"0 0 16px", fontSize:13, fontWeight:600 }}>차량별 현황</h4>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {Object.entries(stats.vStats).map(([num,d])=>{ const v=vehicles.find(x=>x.number===num); return (
                  <div key={num} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 12px", background:"#0f0f23", borderRadius:8 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ width:8, height:8, borderRadius:"50%", background:v?.color||"#888", flexShrink:0 }}/>
                      <div><div style={{fontSize:13,fontWeight:500}}>{d.model}</div><div style={{fontSize:10,color:"#888"}}>{num}</div></div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:12,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>청구 {fmt(d.bill)} <span style={{color:"#888"}}>/ 입금 {fmt(d.dep)}</span></div>
                      <div style={{fontSize:10,color:"#888"}}>{d.cnt}건 / {d.days}일</div>
                    </div>
                  </div>
                );})}
              </div>
            </div>
          </div>
        </div>}

        {/* ── CONTRACTS ── */}
        {tab==="contracts" && <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8 }}>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <input placeholder="검색 (고객명, IMS번호, 보험사, 차종)" value={filter.search} onChange={e=>setFilter(f=>({...f,search:e.target.value}))} style={{...IS,width:260}}/>
              <select value={filter.status} onChange={e=>setFilter(f=>({...f,status:e.target.value}))} style={{...SS,width:120}}><option value="all">전체 상태</option>{Object.keys(STATUS_COLORS).map(s=><option key={s}>{s}</option>)}</select>
              <select value={filter.vehicle} onChange={e=>setFilter(f=>({...f,vehicle:e.target.value}))} style={{...SS,width:180}}><option value="all">전체 차량</option>{vehicles.map(v=><option key={v.number} value={v.number}>{v.model} ({v.number})</option>)}</select>
              <select value={filter.depositMonth} onChange={e=>setFilter(f=>({...f,depositMonth:e.target.value}))} style={{...SS,width:140}}><option value="all">전체 입금월</option><option value="none">미입금</option>{depositMonths.map(m=>{const [y,mm]=m.split("-"); return <option key={m} value={m}>{y}년 {parseInt(mm)}월</option>;})}</select>
            </div>
            <div style={{ display:"flex", gap:6 }}>
              <button onClick={()=>{setEditData(null);setEditModal(true);}} style={{padding:"7px 14px",background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>+ 신규</button>
              <button onClick={()=>fileRef.current?.click()} style={{padding:"7px 14px",background:"#1e1e3f",color:"#aaa",border:"1px solid #2a2a4a",borderRadius:8,fontSize:11,cursor:"pointer"}}>엑셀</button>
              <button onClick={()=>exportToExcel(filtered)} style={{padding:"7px 14px",background:"#1e1e3f",color:"#aaa",border:"1px solid #2a2a4a",borderRadius:8,fontSize:11,cursor:"pointer"}}>내보내기</button>
              <button onClick={doReset} style={{padding:"7px 10px",background:"#1e1e3f",color:"#666",border:"1px solid #2a2a4a",borderRadius:8,fontSize:10,cursor:"pointer"}}>초기화</button>
            </div>
          </div>
          <div style={{ background:"#161630", border:"1px solid #1e1e3f", borderRadius:12, overflow:"hidden" }}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
                <thead><tr style={{borderBottom:"1px solid #1e1e3f"}}>
                  {["IMS","상태","고객명","대여차량","배차일","반납일","대여일수","보험사","청구금","대여료","입금일"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:500,color:"#888",fontSize:11,whiteSpace:"nowrap"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {filtered.map((c,idx)=><tr key={c.id} onClick={()=>setSelected(c)} style={{borderBottom:"1px solid #1a1a35",cursor:"pointer",background:idx%2===0?"transparent":"#13132a"}} onMouseEnter={e=>e.currentTarget.style.background="#1a1a3a"} onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"transparent":"#13132a"}>
                    <td style={{padding:"10px 12px",fontVariantNumeric:"tabular-nums",color:"#aaa",fontSize:11}}>{c.id}</td>
                    <td style={{padding:"10px 12px"}}><Badge status={c.status}/></td>
                    <td style={{padding:"10px 12px",fontWeight:500}}>{c.customerName}</td>
                    <td style={{padding:"10px 12px"}}><div style={{fontSize:12}}>{c.vehicleModel}</div><div style={{fontSize:10,color:"#888"}}>{c.vehicleNumber}</div></td>
                    <td style={{padding:"10px 12px",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{c.startDate||"-"}</td>
                    <td style={{padding:"10px 12px",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{c.endDate||"-"}</td>
                    <td style={{padding:"10px 12px",fontVariantNumeric:"tabular-nums",textAlign:"center"}}>{c.endDate ? `${daysBetween(c.startDate,c.endDate)}일` : <span style={{color:"#f59e0b",fontSize:10}}>진행중</span>}</td>
                    <td style={{padding:"10px 12px"}}>{c.insurer}</td>
                    <td style={{padding:"10px 12px",fontVariantNumeric:"tabular-nums",fontWeight:600,textAlign:"right"}}>{c.billingAmount?fmt(c.billingAmount):"-"}</td>
                    <td style={{padding:"10px 12px",fontVariantNumeric:"tabular-nums",textAlign:"right"}}>{c.rentalFee?fmt(c.rentalFee):"-"}</td>
                    <td style={{padding:"10px 12px",fontVariantNumeric:"tabular-nums"}}>{c.depositDate?<span style={{color:"#10b981"}}>{c.depositDate}</span>:<span style={{color:"#ef4444",fontSize:11}}>미입금</span>}</td>
                  </tr>)}
                  {!filtered.length && <tr><td colSpan={11} style={{padding:32,textAlign:"center",color:"#555"}}>데이터 없음</td></tr>}
                </tbody>
              </table>
            </div>
            <div style={{padding:"14px 18px",borderTop:"1px solid #1e1e3f",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:600,color:"#aaa"}}>{filtered.length}건</span>
              <div style={{display:"flex",gap:20,alignItems:"center"}}>
                <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#888",marginBottom:2}}>청구금 합계</div><div style={{fontSize:16,fontWeight:800,color:"#10b981",fontVariantNumeric:"tabular-nums"}}>{fmt(filtered.reduce((s,c)=>s+(c.billingAmount||0),0))}원</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#888",marginBottom:2}}>대여료 합계</div><div style={{fontSize:16,fontWeight:800,color:"#8b5cf6",fontVariantNumeric:"tabular-nums"}}>{fmt(filtered.reduce((s,c)=>s+(c.rentalFee||0),0))}원</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#888",marginBottom:2}}>차액</div><div style={{fontSize:16,fontWeight:800,color:"#ef4444",fontVariantNumeric:"tabular-nums"}}>{fmt(filtered.reduce((s,c)=>s+(c.billingAmount||0),0)-filtered.reduce((s,c)=>s+(c.rentalFee||0),0))}원</div></div>
              </div>
            </div>
          </div>
        </div>}

        {/* ── SETTLEMENT ── */}
        {tab==="settlement" && <div>
          {(() => {
            // 입금월 집계 (deposit_date 기준)
            const depMonths = [...new Set(contracts.filter(c=>c.depositDate).map(c=>c.depositDate.slice(0,7)))].sort();
            const fixMonths = [...new Set(Object.keys(monthlyFixed).map(k=>k.split("|")[1]))];
            const allMonths = [...new Set([...depMonths, ...fixMonths])].sort();
            const ym = settlMonth;
            const monthContracts = ym==="all" ? contracts.filter(c=>c.depositDate) : contracts.filter(c=>c.depositDate && c.depositDate.startsWith(ym));

            // 차량 목록 (해당 월에 활동 있는 차량 + 고정비 등록된 차량 + 현재 등록 차량)
            const vnums = new Set();
            monthContracts.forEach(c => c.vehicleNumber && vnums.add(c.vehicleNumber));
            if (ym !== "all") Object.keys(monthlyFixed).forEach(k => { const [vn,m]=k.split("|"); if (m===ym) vnums.add(vn); });
            vehicles.forEach(v => vnums.add(v.number));

            // 차량별 집계 (Excel 정산서 방식)
            const vStats = {};
            [...vnums].forEach(vn => {
              const mc = monthContracts.filter(c => c.vehicleNumber === vn);
              const income = mc.reduce((s,c)=>s+(c.rentalFee||0),0);
              const vat = Math.round(income * 10 / 110);
              const deliveryTotal = mc.reduce((s,c)=>s+(c.deliveryFee1||0)+(c.deliveryFee2||0),0);
              const deliveryCnt = mc.reduce((s,c)=>s+((c.deliveryFee1||0)>0?1:0)+((c.deliveryFee2||0)>0?1:0),0);
              const commission = Math.round(mc.reduce((s,c)=>s+((c.rentalFee||0)/1.1)*((c.commissionRate||0)/100),0));
              let installment=0, insurance=0, etc=0;
              if (ym === "all") {
                Object.entries(monthlyFixed).forEach(([k,v])=>{ const [kvn]=k.split("|"); if (kvn===vn) { installment+=v.installment||0; insurance+=v.insurance||0; etc+=v.etc_cost||0; } });
              } else {
                const f = monthlyFixed[`${vn}|${ym}`] || {};
                installment = f.installment || 0; insurance = f.insurance || 0; etc = f.etc_cost || 0;
              }
              const settle = income - vat - installment - insurance - deliveryTotal - commission - etc;
              const model = vehicles.find(x=>x.number===vn)?.model || mc[0]?.vehicleModel || "";
              vStats[vn] = { model, cnt:mc.length, income, vat, installment, insurance, deliveryTotal, deliveryCnt, commission, etc, settle };
            });

            const rows = Object.entries(vStats).sort((a,b)=>a[0].localeCompare(b[0]));
            const T = rows.reduce((a,[,d])=>({
              cnt:a.cnt+d.cnt, income:a.income+d.income, vat:a.vat+d.vat,
              installment:a.installment+d.installment, insurance:a.insurance+d.insurance,
              deliveryTotal:a.deliveryTotal+d.deliveryTotal, deliveryCnt:a.deliveryCnt+d.deliveryCnt,
              commission:a.commission+d.commission, etc:a.etc+d.etc, settle:a.settle+d.settle
            }), {cnt:0,income:0,vat:0,installment:0,insurance:0,deliveryTotal:0,deliveryCnt:0,commission:0,etc:0,settle:0});
            const activeVehicleCount = rows.filter(([,d])=>d.income>0 || d.installment>0 || d.insurance>0 || d.etc>0).length;
            const perVehicle = activeVehicleCount > 0 ? Math.round(T.settle / activeVehicleCount) : 0;
            const [curY,curM] = ym==="all" ? ["",""] : ym.split("-");
            const monthLabel = ym==="all" ? "전체 기간" : `${curY}년 ${parseInt(curM)}월`;
            const canEdit = ym !== "all";

            return (<>
              {/* 월 선택 탭 */}
              <div style={{background:"#161630",border:"1px solid #1e1e3f",borderRadius:12,padding:14,marginBottom:16,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:"#888",fontWeight:600,marginRight:4}}>정산월</span>
                <button onClick={()=>setSettlMonth("all")} style={{padding:"6px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:settlMonth==="all"?700:400,background:settlMonth==="all"?"#3b82f6":"#1e1e3f",color:settlMonth==="all"?"#fff":"#888"}}>전체</button>
                {allMonths.map(m=>{const [y,mm]=m.split("-"); return <button key={m} onClick={()=>setSettlMonth(m)} style={{padding:"6px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:settlMonth===m?700:400,background:settlMonth===m?"#3b82f6":"#1e1e3f",color:settlMonth===m?"#fff":"#888"}}>{y.slice(2)}년 {parseInt(mm)}월</button>;})}
              </div>

              {/* 핵심 KPI 3카드 */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
                <div style={{background:"linear-gradient(135deg,#161630,#1e1e3f)",border:"1px solid #2a2a4a",borderRadius:12,padding:22,borderLeft:`4px solid ${T.settle>=0?"#10b981":"#ef4444"}`}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:600,letterSpacing:"0.5px"}}>총 정산액 ({monthLabel})</div>
                  <div style={{fontSize:30,fontWeight:800,color:T.settle>=0?"#10b981":"#ef4444",fontVariantNumeric:"tabular-nums",lineHeight:1}}>{fmt(T.settle)}<span style={{fontSize:14,color:"#888",marginLeft:4}}>원</span></div>
                  <div style={{fontSize:11,color:"#666",marginTop:8}}>수입 {fmt(T.income)} − 지출 {fmt(T.income-T.settle)}</div>
                </div>
                <div style={{background:"#161630",border:"1px solid #1e1e3f",borderRadius:12,padding:22,borderLeft:"4px solid #3b82f6"}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:600,letterSpacing:"0.5px"}}>1대당 평균 정산</div>
                  <div style={{fontSize:26,fontWeight:800,color:"#3b82f6",fontVariantNumeric:"tabular-nums",lineHeight:1}}>{fmt(perVehicle)}<span style={{fontSize:14,color:"#888",marginLeft:4}}>원</span></div>
                  <div style={{fontSize:11,color:"#666",marginTop:8}}>활동차량 {activeVehicleCount}대 기준</div>
                </div>
                <div style={{background:"#161630",border:"1px solid #1e1e3f",borderRadius:12,padding:22,borderLeft:"4px solid #8b5cf6"}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:600,letterSpacing:"0.5px"}}>차량 대수</div>
                  <div style={{fontSize:26,fontWeight:800,color:"#8b5cf6",fontVariantNumeric:"tabular-nums",lineHeight:1}}>{activeVehicleCount}<span style={{fontSize:14,color:"#888",marginLeft:4}}>대</span></div>
                  <div style={{fontSize:11,color:"#666",marginTop:8}}>전체 등록 {rows.length}대 · 계약 {T.cnt}건</div>
                </div>
              </div>

              {/* 차량별 정산표 */}
              <div style={{background:"#161630",border:"1px solid #1e1e3f",borderRadius:12,padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <h4 style={{margin:0,fontSize:14,fontWeight:600}}>차량별 정산 ({monthLabel})</h4>
                  {!canEdit && <span style={{fontSize:11,color:"#f59e0b"}}>※ 고정비(할부/보험/기타) 편집은 특정 월 선택 시 가능</span>}
                </div>
                {!rows.length ? <div style={{padding:30,textAlign:"center",color:"#555",fontSize:12}}>데이터 없음</div> :
                <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:1100}}>
                  <thead><tr style={{borderBottom:"1px solid #1e1e3f"}}>
                    {["차량","건수","수입","VAT(10%)","할부","보험료","탁송료","수수료","기타","정산"].map(h=><th key={h} style={{padding:"10px 10px",textAlign:h==="차량"?"left":"right",fontWeight:500,color:"#888",fontSize:11,whiteSpace:"nowrap"}}>{h}</th>)}
                  </tr></thead>
                  <tbody>{rows.map(([num,d],idx)=>{
                    const v=vehicles.find(x=>x.number===num);
                    return (
                    <tr key={num} style={{borderBottom:"1px solid #1a1a35",background:idx%2===0?"transparent":"#13132a"}}>
                      <td style={{padding:"10px 10px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{width:8,height:8,borderRadius:"50%",background:v?.color||"#888",flexShrink:0}}/>
                          <div><div style={{fontWeight:600}}>{d.model}</div><div style={{fontSize:10,color:"#888"}}>{num}</div></div>
                        </div>
                      </td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:"#888"}}>{d.cnt}건</td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums",color:"#8b5cf6"}}>{fmt(d.income)}</td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:"#666"}}>{fmt(d.vat)}</td>
                      <td style={{padding:"6px 10px",textAlign:"right"}}>
                        {canEdit ? <EditableAmount value={d.installment} onSave={v=>saveMonthlyFixed(num,ym,{installment:v})}/> : <span style={{fontVariantNumeric:"tabular-nums",color:"#aaa"}}>{fmt(d.installment)}</span>}
                      </td>
                      <td style={{padding:"6px 10px",textAlign:"right"}}>
                        {canEdit ? <EditableAmount value={d.insurance} onSave={v=>saveMonthlyFixed(num,ym,{insurance:v})}/> : <span style={{fontVariantNumeric:"tabular-nums",color:"#aaa"}}>{fmt(d.insurance)}</span>}
                      </td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>
                        <div>{fmt(d.deliveryTotal)}</div>
                        {d.deliveryCnt>0 && <div style={{fontSize:10,color:"#666"}}>{d.deliveryCnt}건</div>}
                      </td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:"#aaa"}}>{fmt(d.commission)}</td>
                      <td style={{padding:"6px 10px",textAlign:"right"}}>
                        {canEdit ? <EditableAmount value={d.etc} onSave={v=>saveMonthlyFixed(num,ym,{etc_cost:v})}/> : <span style={{fontVariantNumeric:"tabular-nums",color:"#aaa"}}>{fmt(d.etc)}</span>}
                      </td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontWeight:800,fontSize:13,fontVariantNumeric:"tabular-nums",color:d.settle>=0?"#10b981":"#ef4444"}}>{fmt(d.settle)}</td>
                    </tr>
                  );})}</tbody>
                  <tfoot><tr style={{borderTop:"2px solid #2a2a4a",background:"#0f0f23"}}>
                    <td style={{padding:"14px 10px",fontWeight:800}}>합계</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{T.cnt}건</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:800,fontVariantNumeric:"tabular-nums",color:"#8b5cf6"}}>{fmt(T.income)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums",color:"#888"}}>{fmt(T.vat)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.installment)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.insurance)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.deliveryTotal)}{T.deliveryCnt>0 && <div style={{fontSize:10,color:"#666",fontWeight:400}}>{T.deliveryCnt}건</div>}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.commission)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.etc)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:900,fontSize:14,fontVariantNumeric:"tabular-nums",color:T.settle>=0?"#10b981":"#ef4444"}}>{fmt(T.settle)}</td>
                  </tr></tfoot>
                </table>
                </div>}
              </div>
            </>);
          })()}
        </div>}

        {/* ── SCHEDULE ── */}
        {tab==="schedule" && <div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <button onClick={()=>{const[y,m]=schedMonth.split("-").map(Number);const d=new Date(y,m-2,1);setSchedMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}} style={{background:"#1e1e3f",border:"1px solid #2a2a4a",borderRadius:8,color:"#e0e0e0",padding:"6px 12px",cursor:"pointer",fontSize:14}}>&lt;</button>
            <span style={{fontSize:16,fontWeight:700,minWidth:130,textAlign:"center"}}>{sched.y}년 {sched.m}월</span>
            <button onClick={()=>{const[y,m]=schedMonth.split("-").map(Number);const d=new Date(y,m,1);setSchedMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}} style={{background:"#1e1e3f",border:"1px solid #2a2a4a",borderRadius:8,color:"#e0e0e0",padding:"6px 12px",cursor:"pointer",fontSize:14}}>&gt;</button>
          </div>
          <div style={{background:"#161630",border:"1px solid #1e1e3f",borderRadius:12,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <div style={{minWidth:sched.dim*36+170}}>
                <div style={{display:"flex",borderBottom:"1px solid #1e1e3f"}}>
                  <div style={{minWidth:170,padding:"8px 14px",fontSize:11,color:"#888",fontWeight:500,flexShrink:0}}>차량</div>
                  {Array.from({length:sched.dim},(_,i)=>{const d=new Date(sched.y,sched.m-1,i+1);const dow=d.getDay();const td=new Date();const isToday=d.getFullYear()===td.getFullYear()&&d.getMonth()===td.getMonth()&&d.getDate()===td.getDate();
                  return <div key={i} style={{minWidth:36,textAlign:"center",padding:"6px 0",fontSize:10,color:dow===0?"#ef4444":dow===6?"#3b82f6":"#888",borderLeft:"1px solid #1a1a35",background:isToday?"#1e1e3f":"transparent"}}><div style={{fontWeight:600}}>{i+1}</div><div>{["일","월","화","수","목","금","토"][dow]}</div></div>;})}
                </div>
                {sched.vs.map(v=>{const vc=vehicles.find(x=>x.number===v.number);return(
                  <div key={v.number} style={{display:"flex",borderBottom:"1px solid #1a1a35",minHeight:52}}>
                    <div style={{minWidth:170,padding:"8px 14px",fontSize:12,flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:vc?.color||"#888",flexShrink:0}}/>
                      <div><div style={{fontWeight:600,fontSize:12}}>{v.model}</div><div style={{fontSize:10,color:"#888"}}>{v.number}</div></div>
                    </div>
                    <div style={{position:"relative",display:"flex",flex:1}}>
                      {Array.from({length:sched.dim},(_,i)=><div key={i} style={{minWidth:36,borderLeft:"1px solid #1a1a35"}}/>)}
                      {v.entries.map((e,i)=>{const sc=STATUS_COLORS[e.status]||STATUS_COLORS["입금완료"];return(
                        <div key={i} onClick={()=>setSelected(e)} style={{position:"absolute",left:(e.bs-1)*36+2,width:(e.be-e.bs+1)*36-4,top:6+(i%2)*22,height:18,background:sc.dot+"cc",borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:600,color:"#fff",overflow:"hidden",whiteSpace:"nowrap",padding:"0 4px"}} title={`${e.customerName} (${e.startDate}~${e.endDate||"진행중"})`}>{e.customerName}</div>
                      );})}
                    </div>
                  </div>
                );})}
                {!sched.vs.length && <div style={{padding:40,textAlign:"center",color:"#555",fontSize:13}}>이 달에 해당하는 계약 없음</div>}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:12,marginTop:12,flexWrap:"wrap"}}>
            {Object.entries(STATUS_COLORS).map(([n,c])=><div key={n} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#888"}}><span style={{width:12,height:12,borderRadius:3,background:c.dot+"cc"}}/>{n}</div>)}
          </div>
        </div>}
      </main>

      {/* Detail Modal */}
      <Modal open={!!selected} onClose={()=>setSelected(null)} title="계약 상세" width={640}>
        {selected && (()=>{
          const unsettled = (selected.billingAmount||0) - (selected.rentalFee||0);
          return <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
            <div>
              <Badge status={selected.status}/>
              <div style={{fontSize:20,fontWeight:700,marginTop:8}}>{selected.customerName}</div>
              <div style={{fontSize:12,color:"#888"}}>IMS {selected.id} | 접수 {selected.receiptNo}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setEditData(selected);setEditModal(true);setSelected(null);}} style={{padding:"6px 14px",background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,fontSize:11,cursor:"pointer"}}>수정</button>
              <button onClick={()=>doDelete(selected.id)} style={{padding:"6px 14px",background:"#ef4444",color:"#fff",border:"none",borderRadius:6,fontSize:11,cursor:"pointer"}}>삭제</button>
            </div>
          </div>

          {/* 차액액 prominent display */}
          {unsettled > 0 && <div style={{background:"linear-gradient(135deg,#991b1b22,#ef444422)",border:"1px solid #ef444455",borderRadius:10,padding:"14px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:"#ef4444",fontWeight:600,marginBottom:2}}>차액액</div>
              <div style={{fontSize:10,color:"#888"}}>청구금 - 대여료</div>
            </div>
            <div style={{fontSize:22,fontWeight:800,color:"#ef4444",fontVariantNumeric:"tabular-nums"}}>{fmt(unsettled)}<span style={{fontSize:12}}>원</span></div>
          </div>}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{background:"#0f0f23",borderRadius:10,padding:14}}>
              <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:600}}>대여 정보</div>
              {[["대여차종",selected.vehicleModel],["차량번호",selected.vehicleNumber],["배차자",selected.dispatcher],["배차일",`${selected.startDate||"-"} ${selected.startTime||""}`],["반납일",`${selected.endDate||"-"} ${selected.endTime||""}`],["대여일수",selected.endDate?`${daysBetween(selected.startDate,selected.endDate)}일`:"진행중"]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12}}><span style={{color:"#888"}}>{l}</span><span style={{fontWeight:500}}>{v}</span></div>)}
            </div>
            <div style={{background:"#0f0f23",borderRadius:10,padding:14}}>
              <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:600}}>고객/보험</div>
              {[["고객차량",`${selected.customerVehicle} (${selected.customerNumber})`],["연락처",selected.customerPhone],["과실",selected.fault],["보험사",selected.insurer],["청구처",selected.billingTo],["수리처",selected.repairShop==="-"?"없음":selected.repairShop]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12}}><span style={{color:"#888"}}>{l}</span><span style={{fontWeight:500}}>{v}</span></div>)}
            </div>
          </div>
          <div style={{background:"#0f0f23",borderRadius:10,padding:14,marginTop:12}}>
            <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:600}}>청구/정산</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
              {[["청구금",fmt(selected.billingAmount)+"원","#10b981"],["대여료",fmt(selected.rentalFee)+"원","#8b5cf6"],["청구일",selected.billingDate||"미청구","#3b82f6"],["입금일",selected.depositDate||"미입금",selected.depositDate?"#10b981":"#ef4444"]].map(([l,v,c])=><div key={l} style={{textAlign:"center"}}><div style={{fontSize:10,color:"#888",marginBottom:3}}>{l}</div><div style={{fontSize:14,fontWeight:700,color:c,fontVariantNumeric:"tabular-nums"}}>{v}</div></div>)}
            </div>
          </div>
        </div>;
        })()}
      </Modal>

      {/* Edit Modal */}
      <Modal open={editModal} onClose={()=>{setEditModal(false);setEditData(null);}} title={editData?"계약 수정":"신규 등록"} width={600}>
        <EditForm init={editData} vehs={vehicles} onSave={doSave} onCancel={()=>{setEditModal(false);setEditData(null);}}/>
      </Modal>
    </div>
  );
}

function EditForm({ init, vehs, onSave, onCancel }) {
  const [f, setF] = useState(init || {
    id:String(Date.now()),status:"배차중",dispatcher:"",startDate:new Date().toISOString().slice(0,10),startTime:"",
    endDate:null,endTime:null,billingDate:null,billingTime:null,depositDate:null,
    vehicleModel:"",vehicleNumber:"",customerName:"",customerVehicle:"",customerNumber:"",
    customerPhone:"",fault:"-",insurer:"",billingTo:"",receiptNo:"",
    salesRep:"-",retriever:"-",referrer:"-",repairShop:"-",billingAmount:0,rentalFee:0,
    deliveryFee1:0,deliveryFee2:0,commissionRate:15,commissionTo:""
  });
  const u = (k,v) => setF(p=>({...p,[k]:v}));
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}>
      <Field label="상태"><select value={f.status} onChange={e=>u("status",e.target.value)} style={SS}>{Object.keys(STATUS_COLORS).map(s=><option key={s}>{s}</option>)}</select></Field>
      <Field label="IMS번호"><input value={f.id} onChange={e=>u("id",e.target.value)} style={IS}/></Field>
      <Field label="배차자"><input value={f.dispatcher} onChange={e=>u("dispatcher",e.target.value)} style={IS}/></Field>
      <Field label="고객명"><input value={f.customerName} onChange={e=>u("customerName",e.target.value)} style={IS}/></Field>
      <Field label="연락처"><input value={f.customerPhone} onChange={e=>u("customerPhone",e.target.value)} style={IS}/></Field>
      <Field label="과실"><input value={f.fault} onChange={e=>u("fault",e.target.value)} style={IS}/></Field>
      <Field label="대여차량">
        <select value={f.vehicleNumber} onChange={e=>{const v=vehs.find(x=>x.number===e.target.value);if(v){u("vehicleModel",v.model);u("vehicleNumber",v.number);}else{u("vehicleModel","");u("vehicleNumber","");}}} style={SS}>
          <option value="">선택</option>{vehs.map(v=><option key={v.number} value={v.number}>{v.model} ({v.number})</option>)}<option value="">신규 (직접입력)</option>
        </select>
      </Field>
      <Field label="차량번호"><input value={f.vehicleNumber} onChange={e=>u("vehicleNumber",e.target.value)} style={IS} placeholder="신규시 직접입력"/></Field>
      {!vehs.find(v=>v.number===f.vehicleNumber) && <Field label="차종명"><input value={f.vehicleModel} onChange={e=>u("vehicleModel",e.target.value)} style={IS} placeholder="예: GLE 클래스"/></Field>}
      <Field label="고객차종"><input value={f.customerVehicle} onChange={e=>u("customerVehicle",e.target.value)} style={IS}/></Field>
      <Field label="고객번호판"><input value={f.customerNumber} onChange={e=>u("customerNumber",e.target.value)} style={IS}/></Field>
      <Field label="보험사"><input value={f.insurer} onChange={e=>u("insurer",e.target.value)} style={IS}/></Field>
      <Field label="청구처"><input value={f.billingTo} onChange={e=>u("billingTo",e.target.value)} style={IS}/></Field>
      <Field label="접수번호"><input value={f.receiptNo} onChange={e=>u("receiptNo",e.target.value)} style={IS}/></Field>
      <Field label="수리처"><input value={f.repairShop} onChange={e=>u("repairShop",e.target.value)} style={IS}/></Field>
      <Field label="배차일"><input type="date" value={f.startDate||""} onChange={e=>u("startDate",e.target.value)} style={IS}/></Field>
      <Field label="배차시간"><input type="time" value={f.startTime||""} onChange={e=>u("startTime",e.target.value)} style={IS}/></Field>
      <Field label="반납일"><input type="date" value={f.endDate||""} onChange={e=>u("endDate",e.target.value||null)} style={IS}/></Field>
      <Field label="반납시간"><input type="time" value={f.endTime||""} onChange={e=>u("endTime",e.target.value)} style={IS}/></Field>
      <Field label="청구일"><input type="date" value={f.billingDate||""} onChange={e=>u("billingDate",e.target.value||null)} style={IS}/></Field>
      <Field label="입금일"><input type="date" value={f.depositDate||""} onChange={e=>u("depositDate",e.target.value||null)} style={IS}/></Field>
      <Field label="청구금"><input type="number" value={f.billingAmount} onChange={e=>u("billingAmount",Number(e.target.value))} style={IS}/></Field>
      <Field label="대여료"><input type="number" value={f.rentalFee} onChange={e=>u("rentalFee",Number(e.target.value))} style={IS}/></Field>
      <Field label="탁송료 1차"><input type="number" value={f.deliveryFee1||0} onChange={e=>u("deliveryFee1",Number(e.target.value))} style={IS}/></Field>
      <Field label="탁송료 2차"><input type="number" value={f.deliveryFee2||0} onChange={e=>u("deliveryFee2",Number(e.target.value))} style={IS}/></Field>
      <Field label="수수료율(%)"><input type="number" step="0.1" value={f.commissionRate||0} onChange={e=>u("commissionRate",Number(e.target.value))} style={IS} placeholder="기본 15"/></Field>
      <Field label="수수료 지급처"><input value={f.commissionTo||""} onChange={e=>u("commissionTo",e.target.value)} style={IS} placeholder="예: 홍길동"/></Field>
    </div>
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
      <button onClick={onCancel} style={{padding:"8px 20px",background:"#1e1e3f",color:"#888",border:"1px solid #2a2a4a",borderRadius:8,fontSize:12,cursor:"pointer"}}>취소</button>
      <button onClick={()=>onSave(f)} style={{padding:"8px 20px",background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>저장</button>
    </div>
  </div>;
}

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
