// ============================================================
// DokchokTab — 미입금 자동 독촉 SMS 컨트롤 패널
// ============================================================
// 백엔드: blrent-accidenterp/send_module/  (Python, Vultr cron)
// DB    : accident_send_settings (id=1), accident_sms_logs, accident_excluded_contracts
// 안전장치 (3중):
//   1) send_engine.MASTER_KILL_SWITCH = True (코드 상수)
//   2) accident_send_settings.send_armed (1회용 무장)
//   3) Vultr crontab LOCKED-BY-USER 코멘트
// ============================================================
function DokchokTab({ sb, contracts, isMobile, userMode }) {
  // owner: 'hq' (본사모드) / 'jiip' (사용자모드, 신동석부장 지입)
  // 모든 settings/logs/excluded 쿼리·쓰기에 owner 필터를 적용해 본사/지입 발송 시스템이 독립적으로 작동.
  const owner = userMode ? 'jiip' : 'hq';
  const fromNumber = userMode ? '010-5602-4417' : '010-2418-8272';

  const [settings, setSettings] = useState(null);
  const [logs, setLogs] = useState([]);
  const [excluded, setExcluded] = useState({}); // {contract_id: {reason, excluded_at, excluded_by}}
  const [templateDraft, setTemplateDraft] = useState("");
  const [cutoffDraft, setCutoffDraft] = useState("");
  const [saving, setSaving] = useState(false);
  const [locallyPaid, setLocallyPaid] = useState(new Set()); // 입금완료 처리한 contract id (페이지 새로고침 전까지 발송예정에서 제외)
  const [recentSends, setRecentSends] = useState({}); // {phone: requestedAtIso} — 1시간 cooldown
  const [tick, setTick] = useState(0); // 1분마다 ++ 해서 cooldown 카운트다운 자동 업데이트

  // 1) 설정 + 로그 + 제외목록 + 최근 1시간 수동발송 큐 로드
  const reload = useCallback(async () => {
    const oneHourAgoIso = new Date(Date.now() - 60*60*1000).toISOString();
    const [{ data: s }, { data: l }, { data: ex }, { data: q }] = await Promise.all([
      sb.from("accident_send_settings").select("*").eq("owner", owner).single(),
      sb.from("accident_sms_logs").select("*").eq("owner", owner).order("sent_at", { ascending: false }).limit(30),
      sb.from("accident_excluded_contracts").select("*").eq("owner", owner),
      sb.from("accident_manual_send_queue").select("target_phones,requested_at")
        .eq("owner", owner).gte("requested_at", oneHourAgoIso),
    ]);
    setSettings(s);
    setTemplateDraft(s?.message_template || "");
    setCutoffDraft(s?.cutoff_billing_date || "");
    setLogs(l || []);
    const exMap = {};
    (ex || []).forEach(r => { exMap[r.contract_id] = r; });
    setExcluded(exMap);
    // 같은 phone 의 가장 최근 requested_at 만 유지
    const rs = {};
    (q || []).forEach(r => {
      const ph = (r.target_phones || [])[0];
      if (ph && (!rs[ph] || r.requested_at > rs[ph])) rs[ph] = r.requested_at;
    });
    setRecentSends(rs);
  }, [sb, owner]);

  useEffect(() => { reload(); }, [reload]);

  // 1분마다 tick 증가 → cooldown 남은시간 자동 갱신 (재렌더만 트리거)
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 60 * 1000);
    return () => clearInterval(id);
  }, []);

  // 2) 미입금 후보 (cutoff 적용, excluded 적용 전) — 제외섹션에서도 사용
  //    청구일로부터 MIN_OVERDUE_DAYS 일 이상 경과한 건만 발송 대상
  //    (백엔드 send_engine.MIN_OVERDUE_DAYS 와 같은 값 유지)
  //    1 = 청구 다음날 08:30 cron 부터 발송 가능
  const MIN_OVERDUE_DAYS = 1;
  const unpaidRaw = useMemo(() => {
    // KST 로컬 date 기반 (헬퍼 ymdLocal — toISOString 은 UTC 변환이라 KST 새벽~오전 하루 어긋남)
    const t = new Date();
    t.setDate(t.getDate() - MIN_OVERDUE_DAYS);
    const thrIso = ymdLocal(t);
    return contracts.filter(c =>
      c.status === "청구완료" && !c.depositDate
      && !locallyPaid.has(c.id)
      && c.billingDate && c.billingDate <= thrIso
      && (!settings?.cutoff_billing_date || c.billingDate >= settings.cutoff_billing_date)
    );
  }, [contracts, settings, locallyPaid]);
  const unpaid = useMemo(() => unpaidRaw.filter(c => !excluded[c.id]), [unpaidRaw, excluded]);
  const excludedRows = useMemo(() => unpaidRaw.filter(c => excluded[c.id]), [unpaidRaw, excluded]);

  // 3) 담당자별 그룹핑 — 그룹 안 청구건은 청구일 오름차순(오래된 게 위),
  //    그룹 자체는 그룹 내 가장 오래된 청구일 기준 오름차순(연체일 많은 그룹이 위).
  const groups = useMemo(() => {
    const map = new Map();
    const noContact = [];
    for (const c of unpaid) {
      const phone = (c.insuranceManagerPhone || "").replace(/-/g, "").trim();
      if (!phone) { noContact.push(c); continue; }
      if (!map.has(phone)) map.set(phone, []);
      map.get(phone).push(c);
    }
    const sortedEntries = [...map.entries()]
      .map(([phone, items]) => {
        const oldest = items.reduce((m, c) => {
          const b = c.billingDate || "9999-12-31";
          return b < m ? b : m;
        }, "9999-12-31");
        return { phone, items, oldest };
      })
      .sort((a, b) => a.oldest.localeCompare(b.oldest))
      .map(g => [g.phone, g.items]);
    return { groups: sortedEntries, noContact };
  }, [unpaid]);

  // 4) 본문 미리보기 (첫 그룹 기준)
  const previewText = useMemo(() => {
    if (!groups.groups.length || !templateDraft) return "";
    const [, items] = groups.groups[0];
    const today = ymdLocal();
    const insurer = items[0].insurer || "";
    const manager_name = items[0].insuranceManagerName || "담당자";
    const total = items.reduce((s, c) => s + (Number(c.billingAmount) || 0), 0);
    const itemsBlock = items.map((c, i) =>
      `${i + 1}) ${c.customerNumber || "-"}/ ${c.customerVehicle || "-"}/ ${c.customerName || "-"}\n` +
      `접수번호 ${c.receiptNo || "-"}\n` +
      `대여기간 ${c.startDate || "?"} ~ ${c.endDate || "?"}\n` +
      `청구일 ${c.billingDate || "-"}\n` +
      `청구액 ${Number(c.billingAmount || 0).toLocaleString()}원`
    ).join("\n\n");
    return templateDraft
      .replaceAll("{insurer}", insurer)
      .replaceAll("{manager_name}", manager_name)
      .replaceAll("{today}", today)
      .replaceAll("{count}", String(items.length))
      .replaceAll("{total}", `${total.toLocaleString()}원`)
      .replaceAll("{items_block}", itemsBlock);
  }, [groups, templateDraft]);

  // 5) 저장 (자동발송 토글 / cutoff / 템플릿 / 무장) — owner 별
  const saveField = async (patch) => {
    setSaving(true);
    const { error } = await sb.from("accident_send_settings")
      .update({ ...patch, updated_at: new Date().toISOString(), updated_by: `ui:erp:${owner}` })
      .eq("owner", owner);
    setSaving(false);
    if (error) { alert("저장 실패: " + error.message); return; }
    await reload();
  };

  const onSaveTemplate = () => saveField({ message_template: templateDraft });
  const onSaveCutoff = () => saveField({ cutoff_billing_date: cutoffDraft || null });

  // 전체 즉시 발송 — owner 의 모든 미입금 대상에게 한 번에 LMS 발송
  // (target_phones=null → process_manual_queue.py 가 전체 발송)
  const [sendAllBusy, setSendAllBusy] = useState(false);
  const onSendAllNow = async () => {
    if (!groups.groups.length) {
      alert("발송 대상이 없습니다.");
      return;
    }
    const totalAll = groups.groups.reduce((s, [, items]) =>
      s + items.reduce((ss, c) => ss + (Number(c.billingAmount) || 0), 0), 0);
    const totalCount = groups.groups.reduce((s, [, items]) => s + items.length, 0);
    if (!confirm(
      `[전체 즉시 발송] ${owner === 'jiip' ? '신동석 지입' : '본사'} 도메인\n\n` +
      `${groups.groups.length}명 담당자 · ${totalCount}건 · ₩${totalAll.toLocaleString()}\n\n` +
      `현재 발송 예정 모든 담당자에게 지금 LMS 를 발송합니다.\n` +
      `(약 1~2분 내 Vultr 큐 처리기가 실행됩니다)`
    )) return;
    setSendAllBusy(true);
    const { error } = await sb.from('accident_manual_send_queue').insert({
      owner, target_phones: null, requested_by: 'ui:erp:all',
    });
    if (error) {
      setSendAllBusy(false);
      alert('전체 발송 요청 실패: ' + error.message);
      return;
    }
    alert(`전체 발송 요청 완료 — 약 1~2분 내 발송됩니다.\n(발송 이력 카드에서 결과 확인 가능)`);
    // 1분 후 자동 재활성화 (같은 페이지에서 중복 클릭만 차단, 다른 PC 와는 분리)
    setTimeout(() => setSendAllBusy(false), 60 * 1000);
  };

  // 담당자별 수동 발송 — accident_manual_send_queue 에 INSERT
  // Vultr cron (*/2 * * * *) 의 process_manual_queue.py 가 처리 → send_engine → SMS 발송
  // 1시간 cooldown: 발송 후 1시간 동안 같은 phone 으로 재발송 차단
  const onManualSendForGroup = async (phone, managerName, count, total) => {
    const phoneFmt = (phone || '').replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
    if (!confirm(
      `[문자발송] ${managerName || '담당자'} (${phoneFmt})\n\n` +
      `${count}건 · ₩${total.toLocaleString()}\n\n` +
      `이 담당자에게 지금 LMS 를 발송합니다.\n` +
      `발송 후 1시간 동안 같은 담당자에게 재발송할 수 없습니다.\n` +
      `(약 1~2분 내 Vultr 큐 처리기가 실행됩니다)`
    )) return;
    const nowIso = new Date().toISOString();
    const { error } = await sb.from('accident_manual_send_queue').insert({
      owner, target_phones: [phone], requested_by: 'ui:erp',
    });
    if (error) { alert('문자발송 요청 실패: ' + error.message); return; }
    // 즉시 cooldown 등록 (DB reload 안 기다림)
    setRecentSends(prev => ({ ...prev, [phone]: nowIso }));
    alert(`문자발송 요청 완료 — 약 1~2분 내 발송됩니다.\n같은 담당자 재발송은 1시간 후 가능합니다.`);
  };

  // 입금완료 처리 — accident_rentals 본 테이블 직접 update
  // (발송예정 row 에서 [💰 입금완료] 버튼 클릭 시)
  const onMarkPaid = async (c) => {
    const today = ymdLocal();
    const input = prompt(
      `입금일을 입력하세요 (YYYY-MM-DD)\n\n${c.customerName || ""} · ${c.customerNumber || ""}\n청구 ${c.billingDate || "?"} · ₩${(c.billingAmount || 0).toLocaleString()}`,
      today
    );
    if (input === null) return;
    const date = (input || "").trim();
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
      alert("YYYY-MM-DD 형식으로 입력해주세요.");
      return;
    }
    const { error } = await sb.from("accident_rentals").update({
      status: "입금완료",
      deposit_date: date,
      updated_at: new Date().toISOString(),
    }).eq("id", c.id);
    if (error) { alert("입금완료 처리 실패: " + error.message); return; }
    // 로컬 stale 처리: 즉시 발송예정에서 사라짐. 페이지 새로고침 시 입금완료 탭에 정상 표시.
    setLocallyPaid(prev => { const n = new Set(prev); n.add(c.id); return n; });
    // 보류로 마킹된 건이라면 보류 마커도 같이 제거 (입금됐으니 의미 없음)
    if (excluded[c.id]) {
      await sb.from("accident_excluded_contracts").delete().eq("contract_id", c.id);
    }
    await reload();
  };

  // 상태 변경 — 요청중 / 분심진행중 / 보류 / 입금완료
  const onChangeStatus = async (c, newValue) => {
    if (newValue === "입금완료") {
      // accident_rentals 본 테이블 update (별도 핸들러)
      return onMarkPaid(c);
    }
    if (newValue === "요청중") {
      // excluded 제거 → 발송 대상 복귀
      const { error } = await sb.from("accident_excluded_contracts")
        .delete().eq("contract_id", c.id).eq("owner", owner);
      if (error) { alert("변경 실패: " + error.message); return; }
    } else {
      // 분심진행중 / 보류 → excluded 마커 upsert (accident_rentals 는 손 안 댐)
      const { error } = await sb.from("accident_excluded_contracts").upsert({
        contract_id: c.id, owner, reason: newValue, excluded_by: `ui:erp:${owner}`,
        excluded_at: new Date().toISOString(),
      }, { onConflict: "contract_id" });
      if (error) { alert("변경 실패: " + error.message); return; }
    }
    await reload();
  };
  // 상태 select 공통 스타일
  const STATUS_OPTIONS = ["요청중", "분심진행중", "보류", "추가입금 필요", "입금완료"];
  const statusStyle = (v) => {
    if (v === "분심진행중") return { bg:"#7c3aed", color:"#fff", border:"#7c3aed" };
    if (v === "보류") return { bg:"#94a3b8", color:"#fff", border:"#94a3b8" };
    if (v === "추가입금 필요") return { bg:"#f97316", color:"#fff", border:"#f97316" };
    if (v === "입금완료") return { bg:"#10b981", color:"#fff", border:"#10b981" };
    return { bg:"#fff", color:"#0f172a", border:"#cbd5e1" }; // 요청중
  };
  const renderStatusSelect = (c, currentReason) => {
    const value = STATUS_OPTIONS.includes(currentReason) ? currentReason : (currentReason ? "보류" : "요청중");
    const s = statusStyle(value);
    return <select value={value} onChange={e=>onChangeStatus(c, e.target.value)}
      title="자동발송 대상 상태. 데이터는 항상 보존됨"
      style={{padding:"6px 10px",background:s.bg,color:s.color,border:`1px solid ${s.border}`,borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",appearance:"auto"}}>
      {STATUS_OPTIONS.map(o => <option key={o} value={o} style={{background:"#fff",color:"#0f172a"}}>{o}</option>)}
    </select>;
  };

  if (!settings) return <div style={{padding:40,textAlign:"center",color:"#0f172a"}}>로딩 중...</div>;

  const ss = settings;
  const total = unpaid.reduce((s, c) => s + (Number(c.billingAmount) || 0), 0);

  // 공통 스타일
  const cardSt = { background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding:"18px 20px" };
  const labelSt = { fontSize:12, color:"#0f172a", marginBottom:6, fontWeight:600 };
  const btnPrimary = { padding:"7px 16px", background:"#3b82f6", color:"#fff", border:"none", borderRadius:7, fontSize:12, fontWeight:700, cursor:"pointer" };
  const btnDanger = { padding:"9px 22px", background:"#dc2626", color:"#fff", border:"none", borderRadius:8, fontSize:13, fontWeight:800, cursor:"pointer" };
  const btnGray = { padding:"7px 16px", background:"#e2e8f0", color:"#0f172a", border:"1px solid #cbd5e1", borderRadius:7, fontSize:12, fontWeight:600, cursor:"pointer" };

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>

    {/* 헤더 */}
    <div style={{display:"flex",alignItems:"baseline",gap:14,flexWrap:"wrap"}}>
      <h3 style={{margin:0,fontSize:18,color:"#18181b"}}>📨 미입금 자동 독촉 SMS</h3>
      <span style={{fontSize:13,color:"#0f172a"}}>매일 08:30 KST (일요일 제외) · 청구 다음날부터 발송 · 본사·지입 모두 매일 1회 · 솔라피 LMS</span>
    </div>

    {/* owner 배지 — 현재 보고 있는 발송 시스템 (본사 hq / 신동석 jiip) */}
    <div style={{
      display:"inline-flex", alignItems:"center", gap:10, padding:"8px 14px",
      borderRadius:10, alignSelf:"flex-start",
      background: userMode ? "#ecfdf5" : "#eff6ff",
      border: `1px solid ${userMode ? "#a7f3d0" : "#bfdbfe"}`,
      color: userMode ? "#065f46" : "#1e40af",
      fontSize:12, fontWeight:600
    }}>
      <span>도메인: <b>{userMode ? "신동석 지입 (jiip)" : "본사 (hq)"}</b></span>
      <span style={{color: userMode ? "#10b981" : "#3b82f6"}}>·</span>
      <span>발신번호 <b>{fromNumber}</b></span>
      <span style={{color: userMode ? "#10b981" : "#3b82f6"}}>·</span>
      <span style={{fontWeight:500}}>설정/로그/제외목록 모두 이 도메인 한정</span>
    </div>

    {/* 1행: 마지막 자동발송 + [전체발송] 버튼 */}
    <div style={{display:"grid",gridTemplateColumns:"1fr",gap:14}}>
      <div style={cardSt}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div>
            <div style={labelSt}>마지막 자동발송</div>
            <div style={{fontSize:18,fontWeight:700,color:"#0f172a"}}>{ss.last_auto_send_date || "-"}</div>
            <div style={{fontSize:11,color:"#0f172a",marginTop:4}}>다음 가능일: {(() => {
              if (!ss.last_auto_send_date) return "(즉시 가능)";
              let d = new Date(ss.last_auto_send_date + "T00:00:00");
              d.setDate(d.getDate() + 1);
              while (d.getDay() === 0) d.setDate(d.getDate() + 1);
              const y = d.getFullYear();
              const m = String(d.getMonth()+1).padStart(2,'0');
              const day = String(d.getDate()).padStart(2,'0');
              return `${y}-${m}-${day}`;
            })()}</div>
          </div>
          <button
            onClick={onSendAllNow}
            disabled={sendAllBusy || !groups.groups.length}
            title={sendAllBusy ? "방금 요청함 — 1분 후 다시 가능" : `발송 예정 ${groups.groups.length}명 담당자 전체에게 즉시 LMS`}
            style={{
              padding:"10px 22px",
              background: (sendAllBusy || !groups.groups.length) ? "#cbd5e1" : "#dc2626",
              color:"#fff", border:"none", borderRadius:8,
              fontSize:14, fontWeight:800,
              cursor: (sendAllBusy || !groups.groups.length) ? "not-allowed" : "pointer",
              whiteSpace:"nowrap",
            }}>
            {sendAllBusy ? "요청됨" : "전체발송"}
          </button>
        </div>
      </div>
    </div>

    {/* 2행: cutoff + 미입금 통계 */}
    <div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "1fr 2fr",gap:14}}>
      <div style={cardSt}>
        <div style={labelSt}>cutoff_billing_date (이 날짜 이전 청구 제외)</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="date" value={cutoffDraft || ""} onChange={e=>setCutoffDraft(e.target.value)}
            style={{padding:"7px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13}}/>
          <button onClick={onSaveCutoff} disabled={saving} style={btnPrimary}>저장</button>
          {cutoffDraft && <button onClick={()=>{setCutoffDraft("");saveField({cutoff_billing_date:null});}} style={btnGray}>비우기</button>}
        </div>
      </div>

      <div style={cardSt}>
        <div style={labelSt}>현재 발송 대상</div>
        <div style={{display:"flex",gap: isMobile ? 12 : 24,alignItems:"baseline",flexWrap:"wrap"}}>
          <div><span style={{fontSize: isMobile ? 18 : 24,fontWeight:800,color:"#dc2626"}}>{unpaid.length}</span><span style={{fontSize:13,marginLeft:4,color:"#0f172a"}}>건 미입금</span></div>
          <div><span style={{fontSize: isMobile ? 18 : 24,fontWeight:800,color:"#0f172a"}}>{groups.groups.length}</span><span style={{fontSize:13,marginLeft:4,color:"#0f172a"}}>명 담당자</span></div>
          <div><span style={{fontSize: isMobile ? 18 : 24,fontWeight:800,color:"#10b981"}}>{total.toLocaleString()}</span><span style={{fontSize:13,marginLeft:4,color:"#0f172a"}}>원 합계</span></div>
          {groups.noContact.length > 0 && <div style={{color:"#dc2626",fontSize:12,fontWeight:600}}>⚠ 담당자번호 없음 {groups.noContact.length}건 (자동 제외)</div>}
        </div>
      </div>
    </div>

    {/* 3행: 본문 템플릿 편집 + 미리보기 */}
    <div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr",gap:14}}>
      <div style={cardSt}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={labelSt}>본문 템플릿</div>
          <button onClick={onSaveTemplate} disabled={saving || templateDraft===ss.message_template} style={btnPrimary}>저장</button>
        </div>
        <textarea value={templateDraft} onChange={e=>setTemplateDraft(e.target.value)}
          style={{width:"100%",minHeight:280,padding:10,border:"1px solid #cbd5e1",borderRadius:6,fontSize:12,fontFamily:"monospace",resize:"vertical"}}/>
        <div style={{marginTop:8,padding:"8px 10px",background:"#f1f5f9",borderRadius:6,fontSize:11,color:"#0f172a",lineHeight:1.6}}>
          <b>변수:</b> <code>{"{insurer}"}</code>, <code>{"{manager_name}"}</code>, <code>{"{today}"}</code>, <code>{"{count}"}</code>, <code>{"{total}"}</code>, <code>{"{items_block}"}</code>
        </div>
      </div>

      <div style={cardSt}>
        <div style={labelSt}>미리보기 (첫 담당자 기준)</div>
        <pre style={{margin:0,padding:12,background:"#0f172a",color:"#e2e8f0",borderRadius:6,fontSize:11,lineHeight:1.6,whiteSpace:"pre-wrap",minHeight:280,overflow:"auto"}}>{previewText || "(발송 대상 없음)"}</pre>
      </div>
    </div>

    {/* 4행: 발송 예정 (담당자별 그룹 + 청구건 상세) */}
    <div style={cardSt}>
      <div style={{...labelSt,marginBottom:12}}>발송 예정 (담당자별 그룹) — {groups.groups.length}명 · {unpaid.length}건 · {total.toLocaleString()}원</div>

      {/* 우리 대여차량별 미입금 건수 */}
      {(() => {
        const byVeh = new Map();
        for (const c of unpaid) {
          const key = c.vehicleNumber || "(미상)";
          if (!byVeh.has(key)) byVeh.set(key, { num: key, model: c.vehicleModel || "", count: 0, total: 0 });
          const v = byVeh.get(key);
          v.count += 1;
          v.total += Number(c.billingAmount) || 0;
        }
        const arr = [...byVeh.values()].sort((a,b)=>b.count-a.count || b.total-a.total);
        if (!arr.length) return null;
        return <div style={{marginBottom:14,padding:"10px 14px",background:"#f1f5f9",borderRadius:8}}>
          <div style={{fontSize:11,color:"#0f172a",marginBottom:6,fontWeight:600}}>🚗 우리 대여차량별 미입금 — {arr.length}대</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {arr.map(v => <span key={v.num} style={{
              padding:"4px 10px",background:"#ffffff",border:"1px solid #cbd5e1",borderRadius:14,fontSize:12,
              display:"inline-flex",alignItems:"center",gap:6,fontVariantNumeric:"tabular-nums"
            }}>
              <span style={{fontWeight:700,color:"#18181b"}}>{v.model || "(차종)"}</span>
              <span style={{color:"#475569"}}>{v.num}</span>
              <span style={{padding:"1px 6px",background:"#fee2e2",color:"#991b1b",borderRadius:8,fontWeight:700}}>{v.count}건</span>
              <span style={{color:"#0f172a",fontWeight:600}}>₩{v.total.toLocaleString()}</span>
            </span>)}
          </div>
        </div>;
      })()}

      {groups.groups.length === 0
        ? <div style={{padding:30,textAlign:"center",color:"#0f172a",fontSize:13}}>발송 대상 없음</div>
        : <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {(() => {
              const PALETTE = ["#3b82f6","#8b5cf6","#10b981","#f59e0b","#ef4444","#06b6d4","#ec4899","#84cc16","#6366f1"];
              const todayDate = new Date(); todayDate.setHours(0,0,0,0);
              const daysBetween = (a,b) => {
                if (!a || !b) return 0;
                const da = new Date(a), db = new Date(b);
                return Math.round((db.getTime()-da.getTime())/86400000);
              };
              return groups.groups.map(([phone, items], gi) => {
                const color = PALETTE[gi % PALETTE.length];
                const groupTotal = items.reduce((s,c)=>s+(Number(c.billingAmount)||0), 0);
                const formattedPhone = phone.replace(/(\d{3})(\d{4})(\d{4})/, "$1-$2-$3");
                const sorted = [...items].sort((a,b)=>(a.billingDate||"").localeCompare(b.billingDate||""));
                return <div key={phone} style={{background:"#ffffff",border:"1px solid #e2e8f0",borderLeft:`5px solid ${color}`,borderRadius:10,padding:"14px 18px",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
                  {/* 그룹 헤더 — 담당자명 + 보험사 + 전화번호 + 그룹합계 */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,gap:12,flexWrap:"wrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                      <span style={{width:12,height:12,borderRadius:"50%",background:color,flexShrink:0}}/>
                      <span style={{fontSize:17,fontWeight:700,color:"#18181b"}}>{items[0].insuranceManagerName || "(이름없음)"}</span>
                      <span style={{fontSize:13,color:"#5b21b6",background:"#ede9fe",padding:"3px 10px",borderRadius:12,fontWeight:600}}>{items[0].insurer || "(보험사미상)"}</span>
                      <span style={{fontSize:13,color:"#0f172a",background:"#f1f5f9",padding:"3px 10px",borderRadius:12,fontWeight:600,fontFamily:"monospace"}}>{formattedPhone}</span>
                      {(() => {
                        // tick 변수 참조로 1분마다 강제 재계산 (cooldown 카운트다운)
                        void tick;
                        const lastIso = recentSends[phone];
                        const remainMin = lastIso
                          ? Math.max(0, 60 - Math.floor((Date.now() - new Date(lastIso).getTime()) / 60000))
                          : 0;
                        const cooldown = remainMin > 0;
                        return <button
                          onClick={()=>onManualSendForGroup(phone, items[0].insuranceManagerName, items.length, groupTotal)}
                          disabled={cooldown}
                          title={cooldown ? `1시간 cooldown — ${remainMin}분 후 재발송 가능` : "이 담당자에게 LMS 발송 (Vultr 큐 1~2분)"}
                          style={{
                            padding:"4px 12px",
                            background: cooldown ? "#cbd5e1" : "#3b82f6",
                            color:"#fff", border:"none", borderRadius:6,
                            fontSize:12, fontWeight:700,
                            cursor: cooldown ? "not-allowed" : "pointer",
                          }}>
                          {cooldown ? `${remainMin}분 후` : "문자발송"}
                        </button>;
                      })()}
                    </div>
                    <div style={{fontSize:14,fontVariantNumeric:"tabular-nums",background:"#fee2e2",color:"#991b1b",padding:"6px 14px",borderRadius:20,fontWeight:700}}>
                      {items.length}건 · ₩{groupTotal.toLocaleString()}
                    </div>
                  </div>
                  {/* 각 청구건 row */}
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {sorted.map(c => {
                      const rentDays = daysBetween(c.startDate, c.endDate);
                      const overdueDays = c.billingDate ? daysBetween(c.billingDate, ymdLocal(todayDate)) : 0;
                      const dailyRate = rentDays > 0 ? Math.round((c.billingAmount||0) / rentDays) : 0;
                      const overdueColor = overdueDays >= 30 ? {bg:"#fee2e2",fg:"#991b1b"} : overdueDays >= 14 ? {bg:"#fed7aa",fg:"#9a3412"} : {bg:"#fef3c7",fg:"#854d0e"};
                      return <div key={c.id} style={{padding: isMobile ? "10px 12px" : "12px 16px",background:"#f8fafc",border:"1px solid #e2e8f0",borderLeft:`3px solid ${color}`,borderRadius:8,display:"flex",flexDirection: isMobile ? "column" : "row",justifyContent: isMobile ? "flex-start" : "space-between",alignItems: isMobile ? "stretch" : "center",gap: isMobile ? 8 : 14}}>
                        <div style={{flex:1,minWidth:0,width:"100%"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                            <span style={{fontSize: isMobile ? 14 : 15,fontWeight:700,color:"#18181b",whiteSpace:"nowrap"}}>{c.customerVehicle || "(차종 없음)"}</span>
                            <span style={{fontSize:13,fontWeight:700,color:"#1e40af",background:"#dbeafe",padding:"2px 9px",borderRadius:5,letterSpacing:0.2,whiteSpace:"nowrap"}}>{c.customerNumber || "-"}</span>
                            <span style={{fontSize:12,color:"#64748b",fontWeight:500,whiteSpace:"nowrap"}}>· {c.customerName || "이름없음"}</span>
                            <span style={{fontSize:11,color:"#0f172a",background:"#f1f5f9",padding:"2px 7px",borderRadius:4,fontWeight:600,whiteSpace:"nowrap"}}>대차 {c.vehicleNumber || "-"} {c.vehicleModel || ""}</span>
                          </div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"6px 8px",fontSize: isMobile ? 12 : 13}}>
                            <span style={{background:"#dbeafe",color:"#1e40af",padding:"3px 10px",borderRadius:12,fontWeight:600,whiteSpace:"nowrap"}}>대여 {c.startDate||"?"} ~ {c.endDate||"?"}{rentDays>0 && ` · ${rentDays}일`}</span>
                            <span style={{background:"#fef3c7",color:"#854d0e",padding:"3px 10px",borderRadius:12,fontWeight:600,whiteSpace:"nowrap"}}>청구 {c.billingDate||"?"}</span>
                            {c.billingDate && <span style={{background:overdueColor.bg,color:overdueColor.fg,padding:"3px 10px",borderRadius:12,fontWeight:700,whiteSpace:"nowrap"}}>⏱ 청구 후 {overdueDays}일 경과</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,justifyContent: isMobile ? "space-between" : "flex-end",width: isMobile ? "100%" : "auto",borderTop: isMobile ? "1px dashed #e2e8f0" : "none",paddingTop: isMobile ? 6 : 0}}>
                          <span style={{color:"#dc2626",fontWeight:800,fontSize: isMobile ? 16 : 18,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>
                            ₩{(c.billingAmount||0).toLocaleString()}
                            {dailyRate>0 && <span style={{color:"#64748b",fontSize: isMobile ? 11 : 13,fontWeight:500,marginLeft:5}}>(일:{dailyRate.toLocaleString()})</span>}
                          </span>
                          {renderStatusSelect(c, null)}
                        </div>
                      </div>;
                    })}
                  </div>
                </div>;
              });
            })()}
          </div>}
      {groups.noContact.length > 0 && <div style={{marginTop:12,padding:"10px 14px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,fontSize:12,color:"#7f1d1d"}}>
        ⚠ 보험사 담당자 연락처가 비어있어 자동 제외된 건 {groups.noContact.length}건 — ERP 계약수정에서 담당자 연락처 입력 필요
      </div>}
    </div>

    {/* 4-1행: 독촉 보류 목록 (분심진행중 / 회수포기 등) — 데이터는 보존, 입금 시 정상 처리 */}
    {excludedRows.length > 0 && <div style={cardSt}>
      <div style={{...labelSt,marginBottom:4}}>📋 독촉 보류 중 — {excludedRows.length}건 · ₩{excludedRows.reduce((s,c)=>s+(Number(c.billingAmount)||0),0).toLocaleString()}</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>데이터는 그대로 보존됩니다. 입금되면 자동으로 입금완료 탭에 표시.</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {excludedRows.sort((a,b)=>(excluded[b.id]?.excluded_at||"").localeCompare(excluded[a.id]?.excluded_at||"")).map(c => {
          const ex = excluded[c.id] || {};
          const isBunsim = (ex.reason || "").includes("분심");
          const _bg = exclusionChipColor(ex.reason) || "#475569";
          const reasonColor = { bg: _bg, border: _bg };
          return <div key={c.id} style={{padding:"10px 14px",background:"#f8fafc",border:"1px solid #e2e8f0",borderLeft:`3px solid ${reasonColor.border}`,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,opacity:0.9}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:9,flexWrap:"wrap",marginBottom:4}}>
                <span style={{padding:"2px 9px",background:reasonColor.bg,color:"#fff",borderRadius:5,fontSize:11,fontWeight:700}}>{isBunsim && "⚖ "}{ex.reason || "사유미상"}</span>
                <span style={{fontSize:14,fontWeight:700,color:"#475569"}}>{c.customerVehicle || ""}</span>
                <span style={{fontSize:12,fontWeight:700,color:"#475569",background:"#e2e8f0",padding:"2px 8px",borderRadius:5}}>{c.customerNumber || "-"}</span>
                <span style={{fontSize:11,color:"#64748b"}}>· {c.customerName || ""}</span>
                <span style={{fontSize:11,color:"#64748b"}}>· {c.insuranceManagerName || ""} ({c.insurer || ""})</span>
              </div>
              <div style={{fontSize:11,color:"#64748b"}}>
                청구 {c.billingDate || "?"} · ₩{(c.billingAmount||0).toLocaleString()}
                {ex.excluded_at && <span style={{marginLeft:10}}>보류 {ex.excluded_at.slice(0,10)}</span>}
              </div>
            </div>
            {renderStatusSelect(c, ex.reason)}
          </div>;
        })}
      </div>
    </div>}

    {/* 5행: 발송 이력 (최근 30건) */}
    <div style={cardSt}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={labelSt}>발송 이력 (최근 30건)</div>
        <button onClick={reload} style={btnGray}>새로고침</button>
      </div>
      {logs.length === 0
        ? <div style={{padding:30,textAlign:"center",color:"#0f172a",fontSize:13}}>발송 이력 없음</div>
        : <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:"#f1f5f9",textAlign:"left"}}>
                  {["일시","유형","수신","담당자","보험사","건수","금액","상태"].map(h=>
                    <th key={h} style={{padding:"7px 8px",borderBottom:"1px solid #cbd5e1",fontWeight:700,color:"#0f172a"}}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {logs.map(l => <tr key={l.id} style={{borderBottom:"1px solid #f1f5f9"}}>
                  <td style={{padding:"7px 8px",color:"#0f172a"}}>{l.sent_at?.slice(0,16).replace("T"," ")}</td>
                  <td style={{padding:"7px 8px"}}><span style={{padding:"2px 6px",background:l.trigger_type==="auto"?"#dbeafe":"#fef3c7",color:l.trigger_type==="auto"?"#1e40af":"#92400e",borderRadius:4,fontSize:10,fontWeight:700}}>{l.trigger_type}</span></td>
                  <td style={{padding:"7px 8px",color:"#0f172a",fontFamily:"monospace"}}>{l.recipient_phone}</td>
                  <td style={{padding:"7px 8px",color:"#0f172a"}}>{l.recipient_name || "-"}</td>
                  <td style={{padding:"7px 8px",color:"#0f172a"}}>{l.insurer || "-"}</td>
                  <td style={{padding:"7px 8px",color:"#0f172a"}}>{l.contract_ids?.length || 0}</td>
                  <td style={{padding:"7px 8px",color:"#0f172a",fontVariantNumeric:"tabular-nums"}}>{(l.total_amount||0).toLocaleString()}</td>
                  <td style={{padding:"7px 8px"}}>
                    {l.solapi_status_code && l.solapi_status_code < 400
                      ? <span style={{color:"#10b981",fontWeight:700}}>✓ {l.solapi_status_code}</span>
                      : <span style={{color:"#dc2626",fontWeight:700}}>✗ {l.solapi_status_code || "?"}</span>}
                  </td>
                </tr>)}
              </tbody>
            </table>
          </div>}
    </div>

  </div>;
}


        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
