function daysBetween(a, b) {

}

// ── Parse IMS Excel (2-row pairs) ──
function parseIMSExcel(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
  const out = [];
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    if (r[0] === "연번" || !r[1]) continue;
    const ims = String(r[1]).trim();
    if (!ims || ims === "null" || ims === "undefined") continue;
    const dr = (i+1 < rows.length) ? rows[i+1] : [];
    const pv = v => { if (v == null || v === "-" || v === "") return null; return String(v).trim(); };
    const pd = v => {
      if (!v || v === "-") return null;
      const s = String(v).trim();
      let m = s.match(/^(\d{4})\.(\d{2})\.(\d{2})$/);
      if (m) return `${m[1]}-${m[2]}-${m[3]}`;
      m = s.match(/^(\d{2})\.(\d{2})\.(\d{2})$/);
      if (m) return `${parseInt(m[1])<50?"20":"19"}${m[1]}-${m[2]}-${m[3]}`;
      return null;
    };
    const pt = v => {
      if (!v) return null;
      if (typeof v === "object" && v.getHours) return `${String(v.getHours()).padStart(2,"0")}:${String(v.getMinutes()).padStart(2,"0")}`;
      if (typeof v === "number") { const t=Math.round(v*1440); return `${String(Math.floor(t/60)%24).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`; }
      return String(v);
    };
    const pm = v => { if (!v || v === "-") return 0; const n=parseInt(String(v).replace(/\D/g,"")); return isNaN(n)?0:n; };
    out.push({
      id:ims, status:pv(r[2])||"배차중", dispatcher:pv(r[3])||"-",
      startDate:pd(r[4]), startTime:pt(dr[4]), endDate:pd(r[5]), endTime:pt(dr[5]),
      billingDate:pd(r[6]), billingTime:pt(dr[6]), depositDate:pd(r[7]),
      vehicleModel:pv(r[8])||"", vehicleNumber:pv(dr[8])||"",
      customerName:pv(r[9])||"", customerVehicle:pv(r[10])||"", customerNumber:pv(dr[10])||"",
      customerPhone:pv(r[11])||"", fault:pv(r[12])||"-",
      insurer:pv(r[13])||"-", billingTo:pv(r[14])||"-", receiptNo:pv(r[15])||"",
      salesRep:pv(r[16])||"-", retriever:pv(r[17])||"-", referrer:pv(r[18])||"-",
      repairShop:pv(r[19])||"-", billingAmount:pm(r[20]), rentalFee:pm(r[21]),
    });
    i++;
  }
  return out;
}

function mergeContracts(existing, incoming) {
  const map = new Map();
  existing.forEach(c => map.set(c.id, c));
  let added=0, updated=0;
  incoming.forEach(c => { if(map.has(c.id)) updated++; else added++; map.set(c.id, c); });
  return { merged: Array.from(map.values()), added, updated };
}

// ── Export to Excel ──
function exportToExcel(contracts) {
  const headers = ["IMS번호","상태","배차자","배차일","배차시간","반납일","반납시간","청구일","입금일","대여차종","차량번호","고객명","고객차종","고객번호판","연락처","과실","보험사","청구처","접수번호","청구금","대여료","대여일수"];
  const rows = contracts.map(c => [
    c.id, c.status, c.dispatcher, c.startDate||"", c.startTime||"", c.endDate||"", c.endTime||"",
    c.billingDate||"", c.depositDate||"", c.vehicleModel, c.vehicleNumber,
    c.customerName, c.customerVehicle, c.customerNumber, c.customerPhone,
    c.fault, c.insurer, c.billingTo, c.receiptNo,
    c.billingAmount||0, c.rentalFee||0, daysBetween(c.startDate, c.endDate)
  ]);
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  // Set column widths
  ws['!cols'] = [
    {wch:10},{wch:10},{wch:8},{wch:12},{wch:8},{wch:12},{wch:8},
    {wch:12},{wch:12},{wch:14},{wch:12},{wch:8},{wch:16},{wch:12},
    {wch:14},{wch:8},{wch:10},{wch:10},{wch:18},{wch:12},{wch:12},{wch:8}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "사고대차");
  XLSX.writeFile(wb, `사고대차_${ymdLocal()}.xlsx`);
}

// KST 로컬 date 를 "YYYY-MM-DD" 로 — toISOString() 은 UTC 변환이라
// KST 새벽~오전 (00:00~08:59) 사이 하루 어긋나므로 직접 포맷.
function ymdLocal(d) {
  d = d || new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// 보류 사유 chip 색상 — accident_excluded_contracts.reason 값 기준.
// 모든 표시 위치 (대시보드 / 계약내역 / 독촉발송 보류목록) 에서 일관 사용.
function exclusionChipColor(reason) {
  if (!reason) return null;
  if (reason.includes('분심')) return '#7c3aed';     // 보라
  if (reason.includes('추가입금')) return '#f97316'; // 주황
  return '#94a3b8';                                   // 회색 (보류 등)
}

function Badge({ status }) {
  const c = STATUS_COLORS[status] || STATUS_COLORS["입금완료"];
  return <span style={{ background:c.bg, color:c.text, padding:"4px 12px", borderRadius:999, fontSize:12, fontWeight:700, display:"inline-flex", alignItems:"center", gap:5, whiteSpace:"nowrap", letterSpacing:"-0.2px" }}><span style={{ width:7, height:7, borderRadius:"50%", background:c.dot }}/>{status}</span>;
}

function Modal({ open, onClose, title, children, width=560 }) {
  if (!open) return null;
  return (
    <div style={{ position:"fixed", inset:0, zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }} onClick={onClose}>
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.5)", backdropFilter:"blur(4px)" }}/>
      <div onClick={e=>e.stopPropagation()} style={{ position:"relative", background:"#1a1a2e", border:"1px solid #cbd5e1", borderRadius:16, width: "100%", maxWidth: `min(${width}px, 95vw)`, maxHeight:"90vh", overflow:"auto", padding: "20px 18px", boxShadow:"0 24px 48px rgba(0,0,0,.4)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <h3 style={{ margin:0, fontSize:18, color:"#18181b" }}>{title}</h3>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#0f172a", fontSize:22, cursor:"pointer", lineHeight:1 }}>x</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return <div style={{ marginBottom:14 }}><label style={{ display:"block", fontSize:11, color:"#0f172a", marginBottom:4 }}>{label}</label>{children}</div>;
}

function EditableAmount({ value, onSave }) {
  const [editing, setEditing] = useState(false);
  const [v, setV] = useState(value);
  useEffect(() => { setV(value); }, [value]);
  const commit = () => { setEditing(false); const n=Number(v)||0; if (n !== value) onSave(n); };
  if (editing) {
    return <input type="number" autoFocus value={v} onChange={e=>setV(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setV(value);setEditing(false);}}} style={{width:90,padding:"4px 6px",background:"#f8fafc",border:"1px solid #3b82f6",borderRadius:4,color:"#18181b",fontSize:12,textAlign:"right",fontVariantNumeric:"tabular-nums",outline:"none"}}/>;
  }
  return <span onClick={()=>setEditing(true)} style={{cursor:"pointer",display:"inline-block",padding:"4px 8px",borderRadius:4,background:value?"#e2e8f0":"transparent",fontVariantNumeric:"tabular-nums",minWidth:60,textAlign:"right",color:value?"#18181b":"#555"}} title="클릭해서 편집">{value ? fmt(value) : "입력"}</span>;
}

const IS = { width:"100%", padding:"8px 12px", background:"#f8fafc", border:"1px solid #cbd5e1", borderRadius:8, color:"#18181b", fontSize:13, outline:"none", boxSizing:"border-box" };
const SS = { ...IS, appearance:"auto" };

function Toast({ msg, type, onDone }) {
  useEffect(() => { const t=setTimeout(onDone,3000); return ()=>clearTimeout(t); }, [onDone]);
  return (
    <div style={{ position:"fixed", top:20, right:20, zIndex:2000, background:type==="success"?"#065f46":"#991b1b", color:"#fff", padding:"12px 20px", borderRadius:10, fontSize:13, fontWeight:500, boxShadow:"0 8px 24px rgba(0,0,0,.3)", animation:"si .2s" }}>
      {msg}
      <style>{`@keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}`}</style>
    </div>
  );
}

function FleetAddForm({ onAdd }) {
  const [num, setNum] = useState("");
  const [model, setModel] = useState("");
  const submit = async () => {
    const ok = await onAdd(num, model);
    if (ok) { setNum(""); setModel(""); }
  };
  const onKey = e => { if (e.key === 'Enter') submit(); };
  return (
    <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center", padding:"12px 14px", background:"#f8fafc", border:"1px dashed #cbd5e1", borderRadius:10 }}>
      <span style={{ fontSize:13, fontWeight:700, color:"#0f172a" }}>+ 차량 추가</span>
      <input value={num} onChange={e=>setNum(e.target.value)} onKeyDown={onKey} placeholder="차량번호 (예: 106호9340)" style={{ padding:"7px 12px", background:"#ffffff", border:"1px solid #cbd5e1", borderRadius:7, fontSize:13, color:"#18181b", flex:"1 1 160px", minWidth:140 }}/>
      <input value={model} onChange={e=>setModel(e.target.value)} onKeyDown={onKey} placeholder="모델 (예: CLE 클래스)" style={{ padding:"7px 12px", background:"#ffffff", border:"1px solid #cbd5e1", borderRadius:7, fontSize:13, color:"#18181b", flex:"1 1 160px", minWidth:140 }}/>
      <button onClick={submit} style={{ padding:"7px 16px", background:"#3b82f6", color:"#fff", border:"none", borderRadius:7, fontSize:13, fontWeight:700, cursor:"pointer" }}>추가</button>
    </div>
  );
}

// ════════════════════════════════════════
function App() {
  const [rawContracts, setRawContracts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("dashboard");
  // 사용자 모드: 4자리 코드(USER_VIEW_CODE) 입력 시 활성화. 활성 시 owner='jiip' 데이터만 표시.
  // 새로고침해도 유지되도록 localStorage에 저장.
  const [userMode, setUserMode] = useState(() => {
    try { return localStorage.getItem('blrent_user_mode') === '1'; } catch { return false; }
  });
  const [userCodeInput, setUserCodeInput] = useState("");
  // 모바일 감지 — 768px 이하면 모바일 레이아웃. matchMedia 로 리사이즈/회전 즉시 반영.
  const [isMobile, setIsMobile] = useState(() => {
    if (typeof window === 'undefined') return false;
    return window.matchMedia('(max-width: 768px)').matches;
  });
  useEffect(() => {
    const mq = window.matchMedia('(max-width: 768px)');
    const handle = e => setIsMobile(e.matches);
    mq.addEventListener ? mq.addEventListener('change', handle) : mq.addListener(handle);
    return () => {
      mq.removeEventListener ? mq.removeEventListener('change', handle) : mq.removeListener(handle);
    };
  }, []);
  const [filter, setFilter] = useState(() => ({
    status:"all", vehicle:"all", search:"", searchField:"customerNumber",
    startMonth: "all",  // 기본: 전체 (IMS 작성순으로 보여줌, 필요 시 필터)
    startMonthTo: "",
  }));
  const [selected, setSelected] = useState(null);
  const [editModal, setEditModal] = useState(false);
  const [editData, setEditData] = useState(null);
  const [toast, setToast] = useState(null);
  const [schedMonth, setSchedMonth] = useState(() => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`; });
  const [settlMonth, setSettlMonth] = useState(() => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`; });
  const [gapMonth, setGapMonth] = useState("all");
  const [monthlyFixed, setMonthlyFixed] = useState({}); // key: "vehicleNumber|YYYY-MM" -> {installment, insurance, etc_cost, etc_note}
  const [unpaidExpanded, setUnpaidExpanded] = useState(new Set());
  const [monthExpanded, setMonthExpanded] = useState(new Set());
  const [deletedContracts, setDeletedContracts] = useState([]);
  const [vehicleViewYm, setVehicleViewYm] = useState(() => {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  });
  // accident_fleet: { vehicleNumber: { model, status, note } }
  // status: 'active' | 'sold' | 'paused' | 'other_use'
  const [rawFleet, setRawFleet] = useState({});
  const [showInactiveFleet, setShowInactiveFleet] = useState(false);
  const fileRef = useRef(null);

  // 모드별 owner 필터링:
  //   본사모드 (userMode=false): owner !== 'jiip' — 본사(hq)/legacy(null) 데이터 노출
  //   사용자모드 (userMode=true): owner === 'jiip' — 신동석부장 지입차만 노출
  const contracts = useMemo(() => {
    return userMode
      ? rawContracts.filter(c => c.owner === 'jiip')
      : rawContracts.filter(c => c.owner !== 'jiip');
  }, [rawContracts, userMode]);
  const fleet = useMemo(() => {
    const out = {};
    for (const [num, info] of Object.entries(rawFleet)) {
      const isJiip = info.owner === 'jiip';
      if (userMode ? isJiip : !isJiip) out[num] = info;
    }
    return out;
  }, [rawFleet, userMode]);
  const deletedContractsView = useMemo(() => {
    return userMode
      ? deletedContracts.filter(c => c.owner === 'jiip')
      : deletedContracts.filter(c => c.owner !== 'jiip');
  }, [deletedContracts, userMode]);

  useEffect(() => {
    (async () => {
      try {
        const [{ data: rentals, error: e1 }, { data: fixed, error: e2 }, { data: fleetData, error: e3 }, { data: excludedRows }] = await Promise.all([
          supabaseClient.from('accident_rentals').select('*').order('start_date', { ascending: false }),
          supabaseClient.from('vehicle_monthly_fixed').select('*'),
          supabaseClient.from('accident_fleet').select('*'),
          supabaseClient.from('accident_excluded_contracts').select('contract_id,reason'),
        ]);
        // 휴지통 = is_deleted, 일반 계약 = 나머지 (한 번에 가져와서 분리)
        if (e1) throw e1;
        if (e2) throw e2;
        if (e3) throw e3;
        // 독촉발송 보류 사유 머지 — 대시보드/상세에서 chip 으로 표시
        const reasonByCid = {};
        (excludedRows || []).forEach(r => { reasonByCid[r.contract_id] = r.reason; });
        const allRentals = rentals.map(fromDbRow).map(c => ({ ...c, exclusionReason: reasonByCid[c.id] || null }));
        setRawContracts(allRentals.filter(c => !c.isDeleted));
        setDeletedContracts(allRentals.filter(c => c.isDeleted));
        const mf = {};
        (fixed||[]).forEach(r => { mf[`${r.vehicle_number}|${r.year_month}`] = { installment: r.installment||0, insurance: r.insurance||0, etc_cost: r.etc_cost||0, etc_note: r.etc_note||"" }; });
        setMonthlyFixed(mf);
        const fm = {};
        (fleetData||[]).forEach(r => { fm[r.vehicle_number] = { model: r.model, status: r.status, note: r.note || '', owner: r.owner || 'hq' }; });
        setRawFleet(fm);
      } catch(e) {
        console.error('Supabase load error:', e);
        setRawContracts(INITIAL_DATA);
      }
      setLoading(false);
    })();
  }, []);

  // 활성 차량 Set + 등록된 fleet 전체 Set
  const activeFleetSet = useMemo(() => {
    const s = new Set();
    Object.entries(fleet).forEach(([num, info]) => { if (info.status === 'active') s.add(num); });
    return s;
  }, [fleet]);
  const fleetSet = useMemo(() => new Set(Object.keys(fleet)), [fleet]);

  // 차량별 카드/스케줄에서 표시할지 여부:
  //   표시: active / monthly_rent / short_rent / maintenance
  //   숨김 (showInactive 토글 시에만 표시): sold / paused / other_use
  const VISIBLE_FLEET_STATUSES = new Set(['active', 'monthly_rent', 'short_rent', 'maintenance']);
  const isFleetVisible = useCallback((num) => {
    const f = fleet[num];
    if (!f) return false; // 미등록 차량은 숨김 (정산엔 별개로 다룸)
    return showInactiveFleet || VISIBLE_FLEET_STATUSES.has(f.status);
  }, [fleet, showInactiveFleet]);

  const saveFleet = useCallback(async (vehicleNumber, patch) => {
    const prev = rawFleet[vehicleNumber] || { model: '', status: 'active', note: '' };
    const next = { ...prev, ...patch };
    setRawFleet(p => ({ ...p, [vehicleNumber]: next }));
    const payload = {
      vehicle_number: vehicleNumber,
      model: next.model,
      status: next.status,
      note: next.note || null,
      updated_at: new Date().toISOString(),
    };
    if (patch.status && patch.status !== prev.status) payload.status_changed_at = new Date().toISOString();
    const { error } = await supabaseClient.from('accident_fleet').upsert(payload, { onConflict: 'vehicle_number' });
    if (error) { setToast({msg:"저장 실패: "+error.message, type:"error"}); }
  }, [fleet]);

  const addFleet = useCallback(async (vehicleNumber, model) => {
    const vn = (vehicleNumber||'').trim();
    const mod = (model||'').trim();
    if (!vn || !mod) { setToast({msg:"차량번호와 모델은 필수입니다", type:"error"}); return false; }
    if (rawFleet[vn]) { setToast({msg:"이미 등록된 차량입니다", type:"error"}); return false; }
    await saveFleet(vn, { model: mod, status: 'active', note: '' });
    setToast({msg:`${vn} 추가됨`, type:"success"});
    return true;
  }, [rawFleet, saveFleet]);

  const deleteFleet = useCallback(async (vehicleNumber) => {
    if (!confirm(`${vehicleNumber}을(를) 차량 목록에서 삭제할까요?\n(과거 계약/통계 데이터는 그대로 유지됩니다)`)) return;
    const { error } = await supabaseClient.from('accident_fleet').delete().eq('vehicle_number', vehicleNumber);
    if (error) { setToast({msg:"삭제 실패: "+error.message, type:"error"}); return; }
    setRawFleet(p => { const n = {...p}; delete n[vehicleNumber]; return n; });
    setToast({msg:"삭제됨", type:"success"});
  }, []);

  // 월별 고정비 저장 (차량×월)
  const saveMonthlyFixed = useCallback(async (vehicleNumber, ym, patch) => {
    const key = `${vehicleNumber}|${ym}`;
    const prev = monthlyFixed[key] || { installment:0, insurance:0, etc_cost:0, etc_note:"" };
    const next = { ...prev, ...patch };
    setMonthlyFixed(p => ({ ...p, [key]: next }));
    const { error } = await supabaseClient.from('vehicle_monthly_fixed').upsert({
      vehicle_number: vehicleNumber, year_month: ym,
      installment: next.installment, insurance: next.insurance,
      etc_cost: next.etc_cost, etc_note: next.etc_note,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'vehicle_number,year_month' });
    if (error) { console.error(error); setToast({msg:"저장 실패: "+error.message, type:"error"}); }
  }, [monthlyFixed]);

  const save = useCallback(async d => { setRawContracts(d); }, []);

  // 보류/입금 상태 변경 — 계약내역 탭의 인라인 드롭다운에서 호출.
  // 독촉발송 탭의 같은 드롭다운과 옵션/색상/동작 일치. DB update 후 로컬 state 즉시 갱신.
  const onChangeExclusionStatus = useCallback(async (c, newVal) => {
    try {
      if (newVal === "입금완료") {
        const today = ymdLocal();
        const input = prompt(`입금일 (YYYY-MM-DD)\n\n${c.customerName || ""} · ${c.customerNumber || ""}\n청구 ${c.billingDate || "?"} · ₩${(c.billingAmount || 0).toLocaleString()}`, today);
        if (input === null) return;
        const d = (input || "").trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) { alert("YYYY-MM-DD 형식"); return; }
        const { error: e1 } = await supabaseClient.from('accident_rentals').update({
          status: '입금완료', deposit_date: d, updated_at: new Date().toISOString()
        }).eq('id', c.id);
        if (e1) { alert("입금완료 실패: " + e1.message); return; }
        await supabaseClient.from('accident_excluded_contracts').delete().eq('contract_id', c.id);
        setRawContracts(prev => prev.map(x => x.id === c.id ? { ...x, status: '입금완료', depositDate: d, exclusionReason: null } : x));
      } else if (newVal === "요청중") {
        const { error } = await supabaseClient.from('accident_excluded_contracts').delete().eq('contract_id', c.id);
        if (error) { alert("변경 실패: " + error.message); return; }
        setRawContracts(prev => prev.map(x => x.id === c.id ? { ...x, exclusionReason: null } : x));
      } else {
        const owner = c.owner || 'hq';
        const { error } = await supabaseClient.from('accident_excluded_contracts').upsert({
          contract_id: c.id, owner, reason: newVal, excluded_by: 'ui:erp:contracts',
          excluded_at: new Date().toISOString(),
        }, { onConflict: 'contract_id' });
        if (error) { alert("변경 실패: " + error.message); return; }
        setRawContracts(prev => prev.map(x => x.id === c.id ? { ...x, exclusionReason: newVal } : x));
      }
    } catch (e) {
      alert("변경 실패: " + e.message);
    }
  }, []);

  // Dynamic vehicles from data
  const vehicles = useMemo(() => {
    const m = new Map();
    contracts.forEach(c => { if(c.vehicleNumber && !m.has(c.vehicleNumber)) m.set(c.vehicleNumber, c.vehicleModel); });
    return Array.from(m.entries()).map(([num,model],i) => ({ model, number:num, color:VCOLORS[i%VCOLORS.length] }));
  }, [contracts]);

  // 계약내역 탭의 "전체 차량" 드롭다운 옵션 — 비활성 fleet 차량 제외 + 현재 다른 필터(status/depositMonth)에 매칭되는 차량만
  const vehicleOptions = useMemo(() => {
    let l = contracts;
    if (filter.status === "미입금") l = l.filter(c => !c.depositDate && c.status !== '배차중');
    else if (filter.status !== "all") l = l.filter(c => c.status === filter.status);
    // 배차월(start_date) 필터: 완전 "YYYY-MM" 형식만 적용 (partial 무시)
    // to 비우면 단일 월 (= to=from). 기간 원하면 to 명시.
    {
      const fromRaw = filter.startMonth !== "all" ? filter.startMonth : "";
      const toRaw = filter.startMonthTo || "";
      const from = /^\d{4}-\d{2}$/.test(fromRaw) ? fromRaw : "";
      const toExplicit = /^\d{4}-\d{2}$/.test(toRaw) ? toRaw : "";
      const to = toExplicit || from;  // to 빈 + from 있으면 단일 월
      // 월 필터 기준: status='입금완료' 면 입금일, 그 외엔 배차일
      const useDeposit = filter.status === '입금완료';
      if (from || to) {
        l = l.filter(c => {
          const src = useDeposit ? c.depositDate : c.startDate;
          if (!src) return false;
          const ym = src.slice(0,7);
          if (from && ym < from) return false;
          if (to && ym > to) return false;
          return true;
        });
      }
    }
    const presentNums = new Set();
    l.forEach(c => { if (c.vehicleNumber) presentNums.add(c.vehicleNumber); });
    return vehicles.filter(v => {
      if (!presentNums.has(v.number)) return false;
      const f = fleet[v.number];
      if (f && f.status !== 'active') return false; // 비활성 fleet 제외 (미등록은 통과)
      return true;
    });
  }, [contracts, filter.status, filter.startMonth, filter.startMonthTo, vehicles, fleet]);

  // File import
  const onImport = useCallback(async e => {
    const f = e.target.files?.[0]; if(!f) return; e.target.value="";
    try {
      const buf = await f.arrayBuffer();
      const wb = XLSX.read(buf, { type:"array", cellDates:true });
      const inc = parseIMSExcel(wb);
      if (!inc.length) { setToast({msg:"파싱할 수 있는 데이터가 없습니다. IMS 엑셀 형식을 확인해주세요.",type:"error"}); return; }
      const {merged,added,updated} = mergeContracts(rawContracts, inc);
      const { error } = await supabaseClient.from('accident_rentals').upsert(merged.map(toDbRow));
      if (error) throw error;
      setRawContracts(merged);
      setToast({msg:`완료: 신규 ${added}건, 업데이트 ${updated}건 (총 ${merged.length}건)`, type:"success"});
    } catch(err) { setToast({msg:"파일 오류: "+err.message, type:"error"}); }
  }, [rawContracts, save]);

  // Stats
  const stats = useMemo(() => {
    const active = contracts.filter(c=>c.status==="배차중").length;
    const pending = contracts.filter(c=>c.status==="청구전").length;
    const totalBill = contracts.reduce((s,c)=>s+(c.billingAmount||0),0);
    const deposited = contracts.filter(c=>c.depositDate);
    const totalDep = contracts.reduce((s,c)=>s+(c.rentalFee||0),0);
    const totalRentalFee = totalDep;
    const monthly = {};
    const _today = new Date();
    const _ensureVeh = (m, vn, model) => {
      if (!m.vehicles[vn]) m.vehicles[vn] = { model: model || '', days: 0, cnt: 0, bill: 0 };
    };
    // 같은 차량×같은 날짜 중복 카운트 방지 (인접 계약의 경계일 보호)
    const _seenVehicleDays = new Set();
    contracts.forEach(c => {
      if (!c.startDate) return;
      // bill/dep/cnt: 시작 월에만 카운트 (계약 단위)
      const startYm = c.startDate.slice(0,7);
      if (!monthly[startYm]) monthly[startYm] = {
        bill:0, dep:0, cnt:0, vehicles:{},
        pending:0, claimed:0, settled:0, active:0, replaced:0
      };
      monthly[startYm].bill += (c.billingAmount||0);
      monthly[startYm].dep += (c.rentalFee||0);
      monthly[startYm].cnt++;
      if (c.status === '청구전') monthly[startYm].pending++;
      else if (c.status === '청구완료') monthly[startYm].claimed++;
      else if (c.status === '입금완료') monthly[startYm].settled++;
      else if (c.status === '배차중') monthly[startYm].active++;
      else if (c.status === '교체') monthly[startYm].replaced++;

      if (!c.vehicleNumber) return;

      // 차량별 시작월 통계 (건수/청구금) — 그 월에 신규 시작한 계약만
      _ensureVeh(monthly[startYm], c.vehicleNumber, c.vehicleModel);
      monthly[startYm].vehicles[c.vehicleNumber].cnt += 1;
      monthly[startYm].vehicles[c.vehicleNumber].bill += (c.billingAmount||0);

      // 차량 활동 일수: 일별 순회로 각 월에 속한 일수만 그 월에 누적
      // 같은 차량의 같은 날짜는 한 번만 카운트 (인접 계약: A 03-06 반납 + B 03-06 인수 시 03-06 중복 방지)
      const start = new Date(c.startDate);
      const end = c.endDate ? new Date(c.endDate) : _today;
      if (end < start) return;
      for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
        const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const dayKey = `${c.vehicleNumber}|${ym}-${String(d.getDate()).padStart(2,'0')}`;
        if (_seenVehicleDays.has(dayKey)) continue;
        _seenVehicleDays.add(dayKey);
        if (!monthly[ym]) monthly[ym] = { bill:0, dep:0, cnt:0, vehicles:{} };
        _ensureVeh(monthly[ym], c.vehicleNumber, c.vehicleModel);
        monthly[ym].vehicles[c.vehicleNumber].days += 1;
      }
    });
    const vStats = {};
    contracts.forEach(c => { const k=c.vehicleNumber; if(!k) return; if(!vStats[k]) vStats[k]={model:c.vehicleModel,cnt:0,bill:0,dep:0,rental:0,days:0}; vStats[k].cnt++; vStats[k].bill+=(c.billingAmount||0); vStats[k].dep+=(c.rentalFee||0); vStats[k].rental+=(c.rentalFee||0); vStats[k].days+=daysBetween(c.startDate,c.endDate); });
    // fleet 에 등록된 차량은 사고대차 청구건이 0건이어도 vStats 에 빈 row 로 포함.
    // (사용자모드 17대 모두 카드에 보이게. 본사 fleet 14대도 동일.)
    Object.entries(fleet).forEach(([num, info]) => {
      if (!vStats[num]) vStats[num] = { model: info?.model || '', cnt:0, bill:0, dep:0, rental:0, days:0 };
    });
    return { active, pending, totalBill, totalDep, totalRentalFee, monthly, vStats, total:contracts.length, depCount:deposited.length };
  }, [contracts, fleet]);

  const sortedMonths = useMemo(() => Object.entries(stats.monthly).sort((a,b)=>a[0].localeCompare(b[0])), [stats.monthly]);
  const maxMA = useMemo(() => Math.max(...sortedMonths.map(([,d])=>d.bill),1), [sortedMonths]);

  // 입금월 목록 (depositDate 기준 + 현재월 강제 포함)
  const depositMonths = useMemo(() => {
    const ms = new Set();
    contracts.forEach(c => {
      if (c.depositDate) ms.add(c.depositDate.slice(0,7));
    });
    const now = new Date();
    ms.add(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`);
    return Array.from(ms).sort();
  }, [contracts]);

  const filtered = useMemo(() => {
    let l = [...contracts];
    if (filter.status === "미입금") l = l.filter(c => !c.depositDate && c.status !== '배차중');
    else if (filter.status !== "all") l = l.filter(c => c.status === filter.status);
    if(filter.vehicle!=="all") l=l.filter(c=>c.vehicleNumber===filter.vehicle);
    {
      const fromRaw = filter.startMonth !== "all" ? filter.startMonth : "";
      const toRaw = filter.startMonthTo || "";
      const from = /^\d{4}-\d{2}$/.test(fromRaw) ? fromRaw : "";
      const toExplicit = /^\d{4}-\d{2}$/.test(toRaw) ? toRaw : "";
      const to = toExplicit || from;  // to 빈 + from 있으면 단일 월
      // 월 필터 기준: status='입금완료' 면 입금일, 그 외엔 배차일
      const useDeposit = filter.status === '입금완료';
      if (from || to) {
        l = l.filter(c => {
          const src = useDeposit ? c.depositDate : c.startDate;
          if (!src) return false;
          const ym = src.slice(0,7);
          if (from && ym < from) return false;
          if (to && ym > to) return false;
          return true;
        });
      }
    }
    if(filter.search){
      const s=filter.search.toLowerCase();
      const match = (val) => (val==null?"":String(val)).toLowerCase().includes(s);
      if (filter.searchField === "all") {
        l=l.filter(c=>match(c.customerName)||match(c.id)||match(c.receiptNo)||match(c.insurer)||match(c.vehicleModel)||match(c.vehicleNumber)||match(c.customerVehicle)||match(c.customerNumber)||match(c.customerPhone));
      } else {
        l=l.filter(c=>match(c[filter.searchField]));
      }
    }
    // IMS 작성순 (id desc) — 사용자 지시: IMS 에서 작성된 순서대로
    return l.sort((a,b) => (Number(b.id)||0) - (Number(a.id)||0));

  const sched = useMemo(() => {
    const [y,m]=schedMonth.split("-").map(Number);
    const dim=new Date(y,m,0).getDate(), f=new Date(y,m-1,1), la=new Date(y,m-1,dim,23,59,59);
    const vs={};
    contracts.forEach(c=>{
      const st=c.startDate?new Date(c.startDate):null, en=c.endDate?new Date(c.endDate):new Date(2099,0,1);
      if(!st||st>la||en<f) return;
      const k=c.vehicleNumber; if(!k) return;
      if(!vs[k]) vs[k]={model:c.vehicleModel,number:k,entries:[]};
      vs[k].entries.push({...c, bs:Math.max(1,st<f?1:st.getDate()), be:Math.min(dim,en>la?dim:en.getDate())});
    });
    // fleet 에 등록된 차량은 이 달에 entries 가 없어도 빈 row 로 표시.
    // (사용자모드 17대 모두 보이게. 본사모드도 동일.)
    Object.entries(fleet).forEach(([num, info]) => {
      if (!vs[num]) vs[num] = { model: info?.model || '', number: num, entries: [] };
    });
    const ordered = Object.values(vs).sort((a, b) => {
      // entries 있는 차량 먼저, 그 안에서 차량번호 정렬
      const ae = a.entries.length > 0 ? 0 : 1;
      const be = b.entries.length > 0 ? 0 : 1;
      if (ae !== be) return ae - be;
      return (a.number || '').localeCompare(b.number || '');
    });
    return {dim,vs:ordered,y,m};

            <span style={{ fontSize:14, fontWeight:700, whiteSpace:"nowrap" }}>사고대차 관리</span>

                    <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, color:"#0f172a", cursor:"pointer", padding:"6px 10px", background:"#f8fafc", border:"1px solid #cbd5e1", borderRadius:7, fontWeight:600 }}>
                      <input type="checkbox" checked={showInactiveFleet} onChange={e=>setShowInactiveFleet(e.target.checked)} style={{margin:0}}/>
                      비활성 포함
                    </label>
                    <select value={_selYear} onChange={e=>setVehicleViewYm(`${e.target.value}-${_selMonth}`)} style={_selectStyle}>
                      {_yearOpts.map(y=><option key={y} value={y}>{y}년</option>)}
                    </select>
                    <select value={_selMonth} onChange={e=>setVehicleViewYm(`${_selYear}-${e.target.value}`)} style={_selectStyle}>
                      {_monthOpts.map(m=><option key={m} value={m}>{parseInt(m)}월</option>)}
                    </select>
                  </div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {Object.entries(stats.vStats).filter(([num]) => isFleetVisible(num)).map(([num,d])=>{
                    const v = vehicles.find(x=>x.number===num);
                    const cars = contracts.filter(c => c.vehicleNumber === num);
                    const _todayStr = ymdLocal(_today);
                    const isActive = cars.some(c =>
                      c.status === '배차중' ||
                      (c.status === '교체' && (!c.endDate || c.endDate >= _todayStr))
                    );
                    const unpaidCount = cars.filter(c => c.status === '청구완료').length;
                    const monthDeps = cars.filter(c => c.depositDate && c.depositDate.startsWith(_ymPrefix));
                    const monthDepCount = monthDeps.length;
                    const monthDepAmount = monthDeps.reduce((s,c)=>s+(c.rentalFee||0),0);
                    const isOpen = unpaidExpanded.has(num);
                    const unpaidItems = cars.filter(c => c.status === '청구전' || c.status === '청구완료' || c.status === '교체' || c.status === '배차중').sort((a,b)=>(b.endDate||"").localeCompare(a.endDate||""));
                    // 당월 계약 건수 + 가동 일수 (가동률)
                    const vmonth = ((stats.monthly||{})[_ymPrefix]?.vehicles || {})[num] || {};
                    const dispatchedCount = vmonth.cnt || 0;
                    const daysRun = vmonth.days || 0;
                    const [_yNum, _mNum] = _ymPrefix.split('-').map(Number);
                    const _curYmStr = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}`;
                    const daysTotal = _ymPrefix === _curYmStr
                      ? _today.getDate()
                      : new Date(_yNum, _mNum, 0).getDate();
                    const fleetInfo = fleet[num];
                    const fleetStatus = fleetInfo?.status || 'active';
                    const isInactiveFleet = fleetStatus !== 'active';
                    const fleetLabel = { sold:'매각', paused:'중단', other_use:'타용도', monthly_rent:'월렌트', short_rent:'단기렌트', maintenance:'수리중' }[fleetStatus];
                    const fleetColor = { sold:'#dc2626', paused:'#a16207', other_use:'#7c3aed', monthly_rent:'#2563eb', short_rent:'#14b8a6', maintenance:'#ea580c' }[fleetStatus];
                    return (
                      <div key={num} style={{ background:"#f8fafc", borderRadius:10, overflow:"hidden", opacity: isInactiveFleet ? 0.65 : 1 }}>
                        <div style={{ display:"flex", flexDirection: isMobile ? "column" : "row", alignItems: isMobile ? "stretch" : "center", padding: isMobile ? "10px 12px" : "16px 20px", gap: isMobile ? 10 : 20 }}>
                          {/* 좌: 차량 정보 */}
                          <div style={{ display:"flex", alignItems:"center", gap:12, flexShrink:0, minWidth: isMobile ? 0 : 170, justifyContent: isMobile ? "space-between" : "flex-start" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:10, minWidth:0 }}>
                              <span style={{ width:12, height:12, borderRadius:"50%", background:v?.color||"#888", flexShrink:0 }}/>
                              <div style={{ minWidth:0 }}>
                                <div style={{fontSize: isMobile ? 16 : 18,fontWeight:700, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap"}}>
                                  {d.model}
                                  {isInactiveFleet && <span style={{fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:4, background:fleetColor+"22", color:fleetColor, letterSpacing:0}}>{fleetLabel}</span>}
                                </div>
                                <div style={{fontSize: isMobile ? 12 : 14,color:"#0f172a",marginTop:2}}>{num}</div>
                              </div>
                            </div>
                            {/* 모바일: 펼침 버튼을 차량 정보 줄 오른쪽으로 */}
                            {isMobile && (
                              <button onClick={()=>{
                                setUnpaidExpanded(prev => { const ns = new Set(prev); if (ns.has(num)) ns.delete(num); else ns.add(num); return ns; });
                              }} style={{padding:"6px 10px",background:isOpen?"#e2e8f0":"#3b82f6",color:isOpen?"#aaa":"#fff",border:"none",borderRadius:6,fontSize:14,fontWeight:700,cursor:"pointer",lineHeight:1,minWidth:40,flexShrink:0}}>{isOpen?"▴":"▾"}</button>
                            )}
                          </div>
                          {/* 중: 통계 4개 가로로 펼침 */}
                          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent: isMobile ? "space-between" : "space-around", flexWrap:"wrap", gap: isMobile ? "8px 10px" : "12px 24px" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8, minWidth: isMobile ? 0 : 90 }}>
                              {isInactiveFleet ? (
                                <span style={{padding: isMobile ? "3px 8px" : "4px 12px",borderRadius:6,background:fleetColor+"22",color:fleetColor,fontWeight:700,fontSize: isMobile ? 11 : 14}}>{fleetLabel}</span>
                              ) : (
                                <span style={{padding: isMobile ? "3px 8px" : "4px 12px",borderRadius:6,background:isActive?"#f59e0b22":"#cbd5e1",color:isActive?"#f59e0b":"#888",fontWeight:700,fontSize: isMobile ? 11 : 14}}>{isActive?"배차중":"대기"}</span>
                              )}
                            </div>
                            <div style={{ textAlign:"center", minWidth: isMobile ? 0 : 80 }}>
                              <div style={{fontSize: isMobile ? 10 : 11,color:"#0f172a",marginBottom:3}}>총 미입금</div>
                              <div style={{fontSize: isMobile ? 15 : 20,fontWeight:700,color:unpaidCount>0?"#ef4444":"#666",fontVariantNumeric:"tabular-nums"}}>{unpaidCount}<span style={{color:"#0f172a",fontSize:11,marginLeft:2,fontWeight:400}}>건</span></div>
                            </div>
                            <div style={{ textAlign:"center", minWidth: isMobile ? 0 : 80 }}>
                              <div style={{fontSize: isMobile ? 10 : 11,color:"#0f172a",marginBottom:3}}>{_monthLabel} 계약</div>
                              <div style={{fontSize: isMobile ? 14 : 18,fontWeight:700,color:dispatchedCount>0?"#3b82f6":"#666",fontVariantNumeric:"tabular-nums"}}>{dispatchedCount}<span style={{color:"#0f172a",fontSize:11,marginLeft:2,fontWeight:400}}>건</span></div>
                            </div>
                            <div style={{ textAlign:"center", minWidth: isMobile ? 0 : 90 }}>
                              <div style={{fontSize: isMobile ? 10 : 11,color:"#0f172a",marginBottom:3}}>가동</div>
                              <div style={{fontSize: isMobile ? 13 : 18,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>
                                <span style={{color:daysRun>0?"#f59e0b":"#666"}}>{daysRun}</span>
                                <span style={{color:"#0f172a",fontSize: isMobile ? 11 : 14,margin:"0 2px",fontWeight:400}}>/</span>
                                <span style={{color:"#0f172a",fontSize: isMobile ? 11 : 14,fontWeight:600}}>{daysTotal}</span>
                                <span style={{color:"#0f172a",fontSize:11,marginLeft:2,fontWeight:400}}>일</span>
                              </div>
                            </div>
                            <div style={{ textAlign:"center", minWidth: isMobile ? 0 : 140, gridColumn: isMobile ? "1 / -1" : "auto" }}>
                              <div style={{fontSize: isMobile ? 10 : 11,color:"#0f172a",marginBottom:3}}>{_monthLabel} 입금</div>
                              <div style={{fontSize: isMobile ? 12 : 16,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>
                                <span style={{color:monthDepCount>0?"#10b981":"#666"}}>{monthDepCount}</span><span style={{color:"#0f172a",fontSize:11,marginLeft:2,fontWeight:400}}>건</span>
                                <span style={{color:"#0f172a",margin:"0 6px"}}>·</span>
                                <span style={{color:monthDepAmount>0?"#10b981":"#666",fontSize: isMobile ? 12 : 16}}>₩{fmt(monthDepAmount)}</span>
                              </div>
                            </div>
                          </div>
                          {/* 우: 펼침 버튼 (PC 전용 — 모바일은 차량 정보 줄에 인라인) */}
                          {!isMobile && (
                            <button onClick={()=>{
                              setUnpaidExpanded(prev => { const ns = new Set(prev); if (ns.has(num)) ns.delete(num); else ns.add(num); return ns; });
                            }} style={{padding:"10px 14px",background:isOpen?"#e2e8f0":"#3b82f6",color:isOpen?"#aaa":"#fff",border:"none",borderRadius:8,fontSize:20,fontWeight:700,cursor:"pointer",lineHeight:1,minWidth:52,flexShrink:0}}>{isOpen?"▴":"▾"}</button>
                          )}
                        </div>
                        {isOpen && <div style={{ padding:"0 14px 14px" }}>
                          {unpaidItems.length === 0 ? <div style={{padding:18,textAlign:"center",color:"#0f172a",fontSize:14,background:"#ffffff",borderRadius:10}}>미청구·미입금 계약 없음</div> :
                            unpaidItems.map(c => {
                              const billDays = c.billingDate ? Math.floor((_today - new Date(c.billingDate)) / 86400000) : null;
                              const isOverdue = billDays !== null && billDays >= 30;
                              const noInsurer = !c.insurer || c.insurer === "-";
                              const noManager = !c.insuranceManagerName;
                              const noPhone = !c.insuranceManagerPhone;
                              return <div key={c.id} style={{ padding:"14px 16px", borderRadius:10, background:"#ffffff", marginTop:10, border: isOverdue ? "1px solid #7f1d1d77" : "1px solid #e2e8f0" }}>
                                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, gap:10 }}>
                                  <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                                    <span style={{ fontWeight:700, color:"#18181b", fontSize:17 }}>{c.customerVehicle || "(차종 없음)"}</span>
                                    <span style={{ fontSize:14, fontWeight:700, color:"#1e40af", background:"#dbeafe", padding:"3px 11px", borderRadius:6, letterSpacing:0.2 }}>{c.customerNumber || "차번호 없음"}</span>
                                    <span style={{ fontSize:13, color:"#64748b", fontWeight:500 }}>· {c.customerName || "이름 없음"}</span>
                                    <Badge status={c.status} />
                                    {c.status === '교체' && (!c.endDate || c.endDate >= ymdLocal(_today)) && <Badge status="배차중" />}
                                    {c.exclusionReason && (() => {
                                      const bg = exclusionChipColor(c.exclusionReason);
                                      const isBunsim = c.exclusionReason.includes('분심');
                                      return <span style={{
                                        fontSize:12, fontWeight:700,
                                        background: bg, color:'#fff', padding:'3px 10px', borderRadius:12,
                                      }}>{isBunsim && '⚖ '}{c.exclusionReason}</span>;
                                    })()}
                                  </div>
                                  <div style={{ display:"flex", gap:8 }}>
                                    <button onClick={()=>_openEdit(c)} style={{ padding:"7px 16px", background:"#3b82f6", color:"#fff", border:"none", borderRadius:7, fontSize:13, cursor:"pointer", fontWeight:700 }}>수정</button>
                                    <button onClick={()=>doDelete(c.id)} style={{ padding:"7px 16px", background:"#ef4444", color:"#fff", border:"none", borderRadius:7, fontSize:13, cursor:"pointer", fontWeight:700 }}>삭제</button>
                                  </div>
                                </div>
                                <div style={{ display:"grid", gridTemplateColumns: isMobile ? "1fr" : "repeat(2,1fr)", gap:"8px 20px", color:"#0f172a", fontSize: isMobile ? 13 : 14 }}>
                                  <div><span style={{color:"#0f172a"}}>대여 </span>{c.startDate||"-"} ~ {c.endDate||"-"}</div>
                                  <div>
                                    {c.status === "청구완료"
                                      ? <><span style={{color:"#0f172a"}}>청구 </span><span style={{color:isOverdue?"#ef4444":"#aaa"}}>{c.billingDate||"-"}</span>{billDays !== null && <span style={{color:isOverdue?"#ef4444":"#888",marginLeft:6,fontWeight:isOverdue?700:400}}>({billDays}일 경과)</span>}</>
                                      : <><span style={{color:"#0f172a"}}>청구금 </span>₩{fmt(c.billingAmount)}</>
                                    }
                                  </div>
                                  <div><span style={{color:"#0f172a"}}>보험사 </span>{noInsurer ? _emptyTag("미입력", c) : c.insurer}</div>
                                  <div><span style={{color:"#0f172a"}}>담당자 </span>{noManager ? _emptyTag("미입력", c) : c.insuranceManagerName}</div>
                                  <div style={{gridColumn:"1 / -1"}}><span style={{color:"#0f172a"}}>연락처 </span>{noPhone ? _emptyTag("미입력 — 클릭하여 입력", c) : <a href={`tel:${c.insuranceManagerPhone}`} style={{color:"#3b82f6",textDecoration:"none",fontWeight:600}}>{c.insuranceManagerPhone}</a>}</div>
                                  {c.status === '교체' && c.replacementOtherVehicle && (
                                    <div style={{gridColumn:"1 / -1", marginTop:8, padding:"10px 14px", background:"#a855f718", borderRadius:8, border:"1px solid #a855f744", fontSize:13, display:"flex", flexWrap:"wrap", gap:"4px 16px", alignItems:"baseline"}}>
                                      <span style={{color:"#a855f7",fontWeight:700}}>🔄 외부차</span>
                                      <span><b style={{color:"#18181b"}}>{c.replacementOtherModel || "(모델 없음)"}</b> <span style={{color:"#0f172a",marginLeft:4}}>{c.replacementOtherVehicle}</span></span>
                                      {(c.replacementOtherStartDate || c.replacementOtherEndDate) && <span style={{color:"#0f172a"}}>{c.replacementOtherStartDate||"-"} ~ {c.replacementOtherEndDate||"-"}</span>}
                                      {c.replacementOtherDays > 0 && <span><b style={{color:"#a855f7"}}>{c.replacementOtherDays}</b><span style={{color:"#0f172a"}}>일</span></span>}
                                      {c.replacementOtherCost > 0 && <span><b style={{color:"#a855f7",fontVariantNumeric:"tabular-nums"}}>₩{fmt(c.replacementOtherCost)}</b></span>}
                                    </div>
                                  )}
                                </div>
                              </div>;
                            })
                          }
                          {monthDeps.length > 0 && (
                            <div style={{marginTop:14, paddingTop:14, borderTop:"1px solid #cbd5e1"}}>
                              <div style={{color:"#10b981", fontSize:14, fontWeight:700, marginBottom:8}}>{_monthLabel} 입금 완료 <b style={{fontSize:16,marginLeft:4}}>{monthDepCount}</b><span style={{color:"#0f172a",fontSize:12,marginLeft:2}}>건</span> <span style={{color:"#0f172a",margin:"0 6px"}}>·</span> <b style={{fontSize:16,fontVariantNumeric:"tabular-nums"}}>₩{fmt(monthDepAmount)}</b></div>
                              {monthDeps.slice().sort((a,b)=>(b.depositDate||"").localeCompare(a.depositDate||"")).map(c => (
                                <div key={c.id} style={{padding:"12px 14px", borderRadius:8, background:"#ffffff", marginTop:8, border:"1px solid #e2e8f0"}}>
                                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:10}}>
                                    <div style={{display:"flex", alignItems:"center", gap:9, flexWrap:"wrap"}}>
                                      <span style={{fontWeight:700, color:"#18181b", fontSize:15}}>{c.customerVehicle || "(차종 없음)"}</span>
                                      <span style={{fontSize:13, fontWeight:700, color:"#1e40af", background:"#dbeafe", padding:"2px 9px", borderRadius:5, letterSpacing:0.2}}>{c.customerNumber || "-"}</span>
                                      <span style={{fontSize:12, color:"#64748b", fontWeight:500}}>· {c.customerName || "이름 없음"}</span>
                                    </div>
                                    <span style={{color:"#10b981",fontWeight:700,fontVariantNumeric:"tabular-nums",fontSize:15, flexShrink:0}}>₩{fmt(c.rentalFee)}</span>
                                  </div>
                                  <div style={{display:"flex", gap:18, marginTop:8, fontSize:13, color:"#0f172a"}}>
                                    <span><span style={{color:"#0f172a"}}>청구 </span>{c.billingDate || "-"}</span>
                                    <span><span style={{color:"#0f172a"}}>입금 </span><span style={{color:"#10b981"}}>{c.depositDate}</span></span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>}
                      </div>
                    );
                  })}
                </div>
              </div>;
            })()}

          </div>
        </div>}

        {/* ── PAID (입금완료) ── */}
        {tab==="paid" && (() => {
          const _today = new Date();
          const _ymPrefix = vehicleViewYm;
          const _selYear = _ymPrefix.split("-")[0];
          const _selMonth = _ymPrefix.split("-")[1];
          const _monthLabel = `${parseInt(_selMonth)}월`;
          const _depYears = new Set();
          contracts.forEach(c => { if (c.depositDate) _depYears.add(c.depositDate.slice(0,4)); });
          _depYears.add(String(_today.getFullYear()));
          const _yearOpts = Array.from(_depYears).sort();
          const _monthOpts = Array.from({length:12},(_,i)=>String(i+1).padStart(2,'0'));
          const _selectStyle = { padding:"6px 10px", background:"#ffffff", border:"1px solid #cbd5e1", borderRadius:7, color:"#18181b", fontSize:14, cursor:"pointer", fontWeight:600 };

          // 차량별로 그 월 입금완료된 계약만 묶기
          const byVehicle = {};
          contracts.forEach(c => {
            if (!c.depositDate || !c.depositDate.startsWith(_ymPrefix)) return;
            if (!c.vehicleNumber) return;
            if (!byVehicle[c.vehicleNumber]) byVehicle[c.vehicleNumber] = { model: c.vehicleModel, items: [] };
            byVehicle[c.vehicleNumber].items.push(c);
          });
          const vehicleList = Object.entries(byVehicle).map(([num,d])=>{
            const amount = d.items.reduce((s,c)=>s+(c.rentalFee||0),0);
            const days = d.items.reduce((s,c)=>s+daysBetween(c.startDate,c.endDate),0);
            return { num, model: d.model, items: d.items, amount, days };
          }).sort((a,b)=>a.num.localeCompare(b.num));

          const totalCount = vehicleList.reduce((s,v)=>s+v.items.length,0);
          const totalAmount = vehicleList.reduce((s,v)=>s+v.amount,0);
          const totalDays = vehicleList.reduce((s,v)=>s+v.days,0);

          return <div>
            <div style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding: isMobile ? "10px 8px" : 24 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems: isMobile ? "stretch" : "center", marginBottom: isMobile ? 12 : 18, gap:12, flexWrap:"wrap", flexDirection: isMobile ? "column" : "row" }}>
                <div>
                  <h3 style={{ margin:0, fontSize: isMobile ? 16 : 18, fontWeight:700, color:"#18181b" }}>입금 완료 <span style={{fontSize: isMobile ? 11 : 13,color:"#0f172a",fontWeight:400,marginLeft: isMobile ? 4 : 8}}>{_monthLabel} 입금된 건만 차량별로</span></h3>
                  <div style={{ fontSize: isMobile ? 12 : 14, color:"#0f172a", marginTop: isMobile ? 4 : 8, display:"flex", flexWrap:"wrap", gap:"2px 6px", alignItems:"baseline" }}>
                    <span>{_monthLabel} 총 <b style={{color:totalCount>0?"#10b981":"#94a3b8",fontSize: isMobile ? 15 : 18,marginLeft:2}}>{totalCount}</b><span style={{color:"#0f172a",marginLeft:2}}>건</span></span>
                    <span style={{color:"#0f172a"}}>·</span>
                    <span><b style={{color:totalDays>0?"#f59e0b":"#94a3b8",fontSize: isMobile ? 15 : 18,fontVariantNumeric:"tabular-nums"}}>{totalDays}</b><span style={{color:"#0f172a",marginLeft:2}}>일</span></span>
                    <span style={{color:"#0f172a"}}>·</span>
                    <b style={{color:totalAmount>0?"#10b981":"#94a3b8",fontSize: isMobile ? 14 : 18,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>₩{fmt(totalAmount)}</b>
                  </div>
                </div>
                <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                  <select value={_selYear} onChange={e=>setVehicleViewYm(`${e.target.value}-${_selMonth}`)} style={_selectStyle}>
                    {_yearOpts.map(y=><option key={y} value={y}>{y}년</option>)}
                  </select>
                  <select value={_selMonth} onChange={e=>setVehicleViewYm(`${_selYear}-${e.target.value}`)} style={_selectStyle}>
                    {_monthOpts.map(m=><option key={m} value={m}>{parseInt(m)}월</option>)}
                  </select>
                </div>
              </div>

              {vehicleList.length === 0 ? <div style={{padding:60,textAlign:"center",color:"#0f172a",fontSize:14,background:"#f8fafc",borderRadius:10}}>{_monthLabel}에 입금 완료된 계약이 없습니다.</div> :
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  {vehicleList.map(v => {
                    const vColor = (vehicles.find(x=>x.number===v.num)?.color) || "#3b82f6";
                    return (
                    <div key={v.num} style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderLeft:`5px solid ${vColor}`, borderRadius:10, padding: isMobile ? "10px 10px" : "14px 18px", boxShadow:"0 1px 2px rgba(0,0,0,0.04)", overflow:"hidden" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems: isMobile ? "stretch" : "center", marginBottom:10, gap:6, flexDirection: isMobile ? "column" : "row", flexWrap:"wrap" }}>
                        <div style={{display:"flex",alignItems:"center",gap:6, flexWrap:"wrap", minWidth:0}}>
                          <span style={{ width:10, height:10, borderRadius:"50%", background:vColor, flexShrink:0 }}/>
                          <span style={{fontSize: isMobile ? 14 : 17,fontWeight:700,color:"#18181b",whiteSpace:"nowrap"}}>{v.model || "(차종 없음)"}</span>

        {/* ── SETTLEMENT ── */}
        {tab==="settlement" && <div>
          {(() => {
            // 입금월 집계 (deposit_date 기준 + 현재월 강제 포함)
            const depMonths = [...new Set(contracts.filter(c=>c.depositDate).map(c=>c.depositDate.slice(0,7)))].sort();
            const fixMonths = [...new Set(Object.keys(monthlyFixed).map(k=>k.split("|")[1]))];
            const _now = new Date();
            const _curMonth = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,"0")}`;
            const allMonths = [...new Set([...depMonths, ...fixMonths, _curMonth])].sort();
            const ym = settlMonth;
            const monthContracts = ym==="all" ? contracts.filter(c=>c.depositDate) : contracts.filter(c=>c.depositDate && c.depositDate.startsWith(ym));

            // 차량 목록 (본사 fleet만, status 무관 — 매각/중단 차량도 통계 포함) — 외부차량/대차교체건은 정산에서 제외
            const vnums = new Set();
            monthContracts.forEach(c => { if (c.vehicleNumber && fleetSet.has(c.vehicleNumber)) vnums.add(c.vehicleNumber); });
            if (ym !== "all") Object.keys(monthlyFixed).forEach(k => { const [vn,m]=k.split("|"); if (m===ym && fleetSet.has(vn)) vnums.add(vn); });
            vehicles.forEach(v => { if (fleetSet.has(v.number)) vnums.add(v.number); });
            // accident_fleet 등록된 모든 차량은 항상 행 표시 (활동 없어도)
            fleetSet.forEach(vn => vnums.add(vn));

            // 차량별 집계 (Excel 정산서 방식)
            const vStats = {};
            [...vnums].forEach(vn => {
              const mc = monthContracts.filter(c => c.vehicleNumber === vn);
              const income = mc.reduce((s,c)=>s+(c.rentalFee||0),0);
              const vat = Math.round(income * 10 / 110);
              const deliveryTotal = mc.reduce((s,c)=>s+(c.deliveryFee1||0)+(c.deliveryFee2||0),0);
              const deliveryCnt = mc.reduce((s,c)=>s+((c.deliveryFee1||0)>0?1:0)+((c.deliveryFee2||0)>0?1:0),0);
              const commission = Math.round(mc.reduce((s,c)=>s+((c.rentalFee||0)/1.1)*((c.commissionRate||0)/100),0));
              let installment=0, insurance=0, etc=0;
              if (ym === "all") {
                Object.entries(monthlyFixed).forEach(([k,v])=>{ const [kvn]=k.split("|"); if (kvn===vn) { installment+=v.installment||0; insurance+=v.insurance||0; etc+=v.etc_cost||0; } });
              } else {
                const f = monthlyFixed[`${vn}|${ym}`] || {};
                installment = f.installment || 0; insurance = f.insurance || 0; etc = f.etc_cost || 0;
              }
              const settle = income - vat - installment - insurance - deliveryTotal - commission - etc;
              const model = vehicles.find(x=>x.number===vn)?.model || mc[0]?.vehicleModel || "";
              vStats[vn] = { model, cnt:mc.length, income, vat, installment, insurance, deliveryTotal, deliveryCnt, commission, etc, settle };
            });

            const rows = Object.entries(vStats).sort((a,b)=>a[0].localeCompare(b[0]));
            const T = rows.reduce((a,[,d])=>({
              cnt:a.cnt+d.cnt, income:a.income+d.income, vat:a.vat+d.vat,
              installment:a.installment+d.installment, insurance:a.insurance+d.insurance,
              deliveryTotal:a.deliveryTotal+d.deliveryTotal, deliveryCnt:a.deliveryCnt+d.deliveryCnt,
              commission:a.commission+d.commission, etc:a.etc+d.etc, settle:a.settle+d.settle
            }), {cnt:0,income:0,vat:0,installment:0,insurance:0,deliveryTotal:0,deliveryCnt:0,commission:0,etc:0,settle:0});
            const activeVehicleCount = rows.filter(([,d])=>d.income>0 || d.installment>0 || d.insurance>0 || d.etc>0).length;
            const perVehicle = activeVehicleCount > 0 ? Math.round(T.settle / activeVehicleCount) : 0;
            const [curY,curM] = ym==="all" ? ["",""] : ym.split("-");
            const monthLabel = ym==="all" ? "전체 기간" : `${curY}년 ${parseInt(curM)}월`;
            const canEdit = ym !== "all";

            return (<>
              {/* 월 선택 탭 */}
              <div style={{background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:12,padding:14,marginBottom:16,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:"#0f172a",fontWeight:600,marginRight:4}}>정산월</span>

              </div>

              {/* 핵심 KPI 3카드 */}
              <div style={{display:"grid",gridTemplateColumns: isMobile ? "1fr" : "repeat(2,1fr)",gap:12,marginBottom:20}}>
                <div style={{background:"linear-gradient(135deg,#ffffff,#e2e8f0)",border:"1px solid #cbd5e1",borderRadius:12,padding: isMobile ? 14 : 22,borderLeft:`4px solid ${T.settle>=0?"#10b981":"#ef4444"}`}}>
                  <div style={{fontSize:11,color:"#0f172a",marginBottom:8,fontWeight:600,letterSpacing:"0.5px"}}>총 정산액 ({monthLabel})</div>
                  <div style={{fontSize: isMobile ? 22 : 30,fontWeight:800,color:T.settle>=0?"#10b981":"#ef4444",fontVariantNumeric:"tabular-nums",lineHeight:1,wordBreak:"break-all"}}>{fmt(T.settle)}<span style={{fontSize: isMobile ? 12 : 14,color:"#0f172a",marginLeft:4}}>원</span></div>
                  <div style={{fontSize:11,color:"#0f172a",marginTop:8}}>수입 {fmt(T.income)} − 지출 {fmt(T.income-T.settle)}</div>
                </div>
                <div style={{background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:12,padding: isMobile ? 14 : 22,borderLeft:"4px solid #8b5cf6"}}>
                  <div style={{fontSize:11,color:"#0f172a",marginBottom:8,fontWeight:600,letterSpacing:"0.5px"}}>차량 대수</div>
                  <div style={{fontSize: isMobile ? 20 : 26,fontWeight:800,color:"#8b5cf6",fontVariantNumeric:"tabular-nums",lineHeight:1}}>{activeVehicleCount}<span style={{fontSize: isMobile ? 12 : 14,color:"#0f172a",marginLeft:4}}>대</span></div>
                  <div style={{fontSize:11,color:"#0f172a",marginTop:8}}>전체 등록 {rows.length}대 · 계약 {T.cnt}건</div>
                </div>
              </div>

              {/* 차량별 정산표 */}
              <div style={{background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:12,padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <h4 style={{margin:0,fontSize:14,fontWeight:600}}>차량별 정산 ({monthLabel})</h4>
                  {!canEdit && <span style={{fontSize:11,color:"#f59e0b"}}>※ 고정비(할부/보험/기타) 편집은 특정 월 선택 시 가능</span>}
                </div>
                {!rows.length ? <div style={{padding:30,textAlign:"center",color:"#0f172a",fontSize:12}}>데이터 없음</div> :
                <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:1100}}>
                  <thead><tr style={{borderBottom:"1px solid #e2e8f0"}}>
                    {["차량","건수","수입","VAT(10%)","할부","보험료","탁송료","수수료","기타","정산"].map(h=><th key={h} style={{padding:"10px 10px",textAlign:h==="차량"?"left":"right",fontWeight:500,color:"#0f172a",fontSize:11,whiteSpace:"nowrap"}}>{h}</th>)}
                  </tr></thead>
                  <tbody>{rows.map(([num,d],idx)=>{
                    const v=vehicles.find(x=>x.number===num);
                    const fInfo=fleet[num];
                    const fStatus=fInfo?.status||'active';
                    const isInactiveRow=fStatus!=='active';
                    const fLabel={sold:'매각',paused:'중단',other_use:'타용도',monthly_rent:'월렌트',short_rent:'단기렌트',maintenance:'수리중'}[fStatus];
                    const fColor={sold:'#dc2626',paused:'#a16207',other_use:'#7c3aed',monthly_rent:'#2563eb',short_rent:'#14b8a6',maintenance:'#ea580c'}[fStatus];
                    return (
                    <tr key={num} style={{borderBottom:"1px solid #f1f5f9",background:idx%2===0?"#ffffff":"#f8fafc",opacity:isInactiveRow?0.7:1}}>
                      <td style={{padding:"10px 10px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{width:8,height:8,borderRadius:"50%",background:v?.color||"#888",flexShrink:0}}/>
                          <div>
                            <div style={{fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                              {d.model || fInfo?.model || "(차종 없음)"}
                              {fLabel && <span style={{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,background:fColor+"22",color:fColor}}>{fLabel}</span>}
                            </div>
                            <div style={{fontSize:10,color:"#0f172a"}}>{num}</div>
                          </div>
                        </div>
                      </td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:"#0f172a"}}>{d.cnt}건</td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums",color:"#8b5cf6"}}>{fmt(d.income)}</td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:"#0f172a"}}>{fmt(d.vat)}</td>
                      <td style={{padding:"6px 10px",textAlign:"right"}}>
                        {canEdit ? <EditableAmount value={d.installment} onSave={v=>saveMonthlyFixed(num,ym,{installment:v})}/> : <span style={{fontVariantNumeric:"tabular-nums",color:"#0f172a"}}>{fmt(d.installment)}</span>}
                      </td>
                      <td style={{padding:"6px 10px",textAlign:"right"}}>
                        {canEdit ? <EditableAmount value={d.insurance} onSave={v=>saveMonthlyFixed(num,ym,{insurance:v})}/> : <span style={{fontVariantNumeric:"tabular-nums",color:"#0f172a"}}>{fmt(d.insurance)}</span>}
                      </td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>
                        <div>{fmt(d.deliveryTotal)}</div>
                        {d.deliveryCnt>0 && <div style={{fontSize:10,color:"#0f172a"}}>{d.deliveryCnt}건</div>}
                      </td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:"#0f172a"}}>{fmt(d.commission)}</td>
                      <td style={{padding:"6px 10px",textAlign:"right"}}>
                        {canEdit ? <EditableAmount value={d.etc} onSave={v=>saveMonthlyFixed(num,ym,{etc_cost:v})}/> : <span style={{fontVariantNumeric:"tabular-nums",color:"#0f172a"}}>{fmt(d.etc)}</span>}
                      </td>
                      <td style={{padding:"10px 10px",textAlign:"right",fontWeight:800,fontSize:13,fontVariantNumeric:"tabular-nums",color:d.settle>=0?"#10b981":"#ef4444"}}>{fmt(d.settle)}</td>
                    </tr>
                  );})}</tbody>
                  <tfoot><tr style={{borderTop:"2px solid #cbd5e1",background:"#f8fafc"}}>
                    <td style={{padding:"14px 10px",fontWeight:800}}>합계</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{T.cnt}건</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:800,fontVariantNumeric:"tabular-nums",color:"#8b5cf6"}}>{fmt(T.income)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums",color:"#0f172a"}}>{fmt(T.vat)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.installment)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.insurance)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.deliveryTotal)}{T.deliveryCnt>0 && <div style={{fontSize:10,color:"#0f172a",fontWeight:400}}>{T.deliveryCnt}건</div>}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.commission)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(T.etc)}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:900,fontSize:14,fontVariantNumeric:"tabular-nums",color:T.settle>=0?"#10b981":"#ef4444"}}>{fmt(T.settle)}</td>
                  </tr></tfoot>
                </table>
                </div>}
              </div>
            </>);
          })()}
        </div>}

        {/* ── SCHEDULE ── */}
        {tab==="schedule" && <div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <button onClick={()=>{const[y,m]=schedMonth.split("-").map(Number);const d=new Date(y,m-2,1);setSchedMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}} style={{background:"#e2e8f0",border:"1px solid #cbd5e1",borderRadius:8,color:"#18181b",padding:"6px 12px",cursor:"pointer",fontSize:14}}>&lt;</button>
            <span style={{fontSize:16,fontWeight:700,minWidth:130,textAlign:"center"}}>{sched.y}년 {sched.m}월</span>
            <button onClick={()=>{const[y,m]=schedMonth.split("-").map(Number);const d=new Date(y,m,1);setSchedMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}} style={{background:"#e2e8f0",border:"1px solid #cbd5e1",borderRadius:8,color:"#18181b",padding:"6px 12px",cursor:"pointer",fontSize:14}}>&gt;</button>
            <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, color:"#0f172a", cursor:"pointer", padding:"6px 10px", background:"#f8fafc", border:"1px solid #cbd5e1", borderRadius:7, fontWeight:600, marginLeft:8 }}>
              <input type="checkbox" checked={showInactiveFleet} onChange={e=>setShowInactiveFleet(e.target.checked)} style={{margin:0}}/>
              비활성 포함
            </label>
          </div>
          <div style={{background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:12,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <div style={{minWidth:sched.dim*(isMobile?30:36)+(isMobile?130:170)}}>
                <div style={{display:"flex",borderBottom:"1px solid #e2e8f0"}}>
                  <div style={{minWidth: isMobile ? 130 : 170,padding:"8px 14px",fontSize:11,color:"#0f172a",fontWeight:500,flexShrink:0}}>차량</div>
                  {Array.from({length:sched.dim},(_,i)=>{const d=new Date(sched.y,sched.m-1,i+1);const dow=d.getDay();const td=new Date();const isToday=d.getFullYear()===td.getFullYear()&&d.getMonth()===td.getMonth()&&d.getDate()===td.getDate();const cellW=isMobile?30:36;
                  return <div key={i} style={{minWidth:cellW,textAlign:"center",padding:"6px 0",fontSize:10,color:dow===0?"#ef4444":dow===6?"#3b82f6":"#888",borderLeft:"1px solid #1a1a35",background:isToday?"#e2e8f0":"transparent"}}><div style={{fontWeight:600}}>{i+1}</div><div>{["일","월","화","수","목","금","토"][dow]}</div></div>;})}
                </div>
                {sched.vs.filter(v=>isFleetVisible(v.number)).map(v=>{const vc=vehicles.find(x=>x.number===v.number);const fInfo=fleet[v.number];const fStatus=fInfo?.status||'active';const fLabel={sold:'매각',paused:'중단',other_use:'타용도',monthly_rent:'월렌트',short_rent:'단기렌트',maintenance:'수리중'}[fStatus];const fColor={sold:'#dc2626',paused:'#a16207',other_use:'#7c3aed',monthly_rent:'#2563eb',short_rent:'#14b8a6',maintenance:'#ea580c'}[fStatus];const cellW=isMobile?30:36;return(
                  <div key={v.number} style={{display:"flex",borderBottom:"1px solid #1a1a35",minHeight:52,opacity:fStatus!=='active'?0.6:1}}>
                    <div style={{minWidth: isMobile ? 130 : 170,padding: isMobile ? "8px 10px" : "8px 14px",fontSize: isMobile ? 11 : 12,flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:vc?.color||"#888",flexShrink:0}}/>
                      <div style={{minWidth:0}}><div style={{fontWeight:600,fontSize: isMobile ? 11 : 12,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v.model}{fLabel&&<span style={{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,background:fColor+"22",color:fColor}}>{fLabel}</span>}</div><div style={{fontSize:10,color:"#0f172a"}}>{v.number}</div></div>
                    </div>
                    <div style={{position:"relative",display:"flex",flex:1}}>
                      {Array.from({length:sched.dim},(_,i)=><div key={i} style={{minWidth:cellW,borderLeft:"1px solid #1a1a35"}}/>)}
                      {v.entries.map((e,i)=>{const sc=STATUS_COLORS[e.status]||STATUS_COLORS["입금완료"];return(
                        <div key={i} onClick={()=>setSelected(e)} style={{position:"absolute",left:(e.bs-1)*cellW+2,width:(e.be-e.bs+1)*cellW-4,top:6+(i%2)*22,height:18,background:sc.dot+"cc",borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:600,color:"#fff",overflow:"hidden",whiteSpace:"nowrap",padding:"0 4px"}} title={`${e.customerName} (${e.startDate}~${e.endDate||"진행중"})`}>{e.customerName}</div>
                      );})}
                    </div>
                  </div>
                );})}
                {!sched.vs.length && <div style={{padding:40,textAlign:"center",color:"#0f172a",fontSize:13}}>이 달에 해당하는 계약 없음</div>}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:12,marginTop:12,flexWrap:"wrap"}}>
            {Object.entries(STATUS_COLORS).map(([n,c])=><div key={n} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#0f172a"}}><span style={{width:12,height:12,borderRadius:3,background:c.dot+"cc"}}/>{n}</div>)}
          </div>
        </div>}

        {/* ── FLEET (차량 관리) ── */}
        {tab==="fleet" && (() => {
          const STATUS_OPTIONS = [
            { v:'active',        l:'운영중',       c:'#10b981' },
            { v:'monthly_rent',  l:'월렌트',       c:'#2563eb' },
            { v:'short_rent',    l:'단기렌트',     c:'#14b8a6' },
            { v:'maintenance',   l:'수리중',       c:'#ea580c' },
            { v:'sold',          l:'매각',         c:'#dc2626' },
            { v:'paused',        l:'사고대여 중단', c:'#a16207' },
            { v:'other_use',     l:'타용도',       c:'#7c3aed' },
          ];
          const rows = Object.entries(fleet)
            .map(([num, info]) => ({ num, ...info }))
            .sort((a,b) => {
              // active 먼저, 그 안에서 차량번호 정렬
              const aActive = a.status === 'active' ? 0 : 1;
              const bActive = b.status === 'active' ? 0 : 1;
              if (aActive !== bActive) return aActive - bActive;
              return a.num.localeCompare(b.num);
            });
          const counts = rows.reduce((acc, r) => { acc[r.status] = (acc[r.status]||0)+1; return acc; }, {});
          return <div>
            <div style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding: isMobile ? 12 : 24, marginBottom:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16, flexWrap:"wrap", gap:14 }}>
                <div>
                  <h3 style={{ margin:0, fontSize:18, fontWeight:700, color:"#18181b" }}>차량 관리</h3>
                  <div style={{ fontSize:13, color:"#0f172a", marginTop:6 }}>운영 중인 차량만 대시보드/스케줄에 표시. 매각·중단·타용도 차량은 화면에서 숨겨지지만 과거 통계·정산은 그대로 잡힙니다.</div>
                </div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {STATUS_OPTIONS.map(s => (
                    <span key={s.v} style={{ padding:"4px 10px", borderRadius:6, background:s.c+"18", color:s.c, fontSize:12, fontWeight:700 }}>{s.l} {counts[s.v]||0}</span>
                  ))}
                </div>
              </div>
              {/* 신규 추가 폼 */}
              <FleetAddForm onAdd={addFleet}/>
            </div>

            <div style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:12, padding:0, overflow:"hidden" }}>
              <div style={{ padding:"14px 20px", borderBottom:"1px solid #e2e8f0", background:"#f8fafc", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ fontSize:14, fontWeight:700 }}>등록 차량 {rows.length}대</span>
              </div>
              {rows.length === 0 ? <div style={{ padding:40, textAlign:"center", color:"#0f172a", fontSize:13 }}>등록된 차량이 없습니다. 위에서 추가하세요.</div> :
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead><tr style={{ borderBottom:"1px solid #e2e8f0", background:"#f8fafc" }}>
                    {["차량번호","모델","운영 상태","메모","액션"].map(h => <th key={h} style={{ padding:"10px 14px", textAlign:"left", fontWeight:600, color:"#0f172a", fontSize:12, whiteSpace:"nowrap" }}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {rows.map(r => {
                      const opt = STATUS_OPTIONS.find(s => s.v === r.status) || STATUS_OPTIONS[0];
                      const isInactive = r.status !== 'active';
                      return <tr key={r.num} style={{ borderBottom:"1px solid #f1f5f9", opacity: isInactive ? 0.75 : 1 }}>
                        <td style={{ padding:"12px 14px", fontWeight:700, fontFamily:"'Pretendard',monospace" }}>{r.num}</td>
                        <td style={{ padding:"12px 14px" }}>{r.model}</td>
                        <td style={{ padding:"8px 14px" }}>
                          <select value={r.status} onChange={e=>saveFleet(r.num, { status: e.target.value })} style={{ padding:"6px 10px", background: opt.c+"15", color: opt.c, border:`1px solid ${opt.c}55`, borderRadius:6, fontSize:13, fontWeight:700, cursor:"pointer", minWidth:140 }}>
                            {STATUS_OPTIONS.map(s => <option key={s.v} value={s.v}>{s.l}</option>)}
                          </select>
                        </td>
                        <td style={{ padding:"8px 14px" }}>
                          <input defaultValue={r.note} onBlur={e=>{ const v = e.target.value; if (v !== r.note) saveFleet(r.num, { note: v }); }} placeholder="사유, 매각일 등" style={{ width:"100%", minWidth:200, padding:"6px 10px", background:"#f8fafc", border:"1px solid #cbd5e1", borderRadius:6, fontSize:13, color:"#18181b" }}/>
                        </td>
                        <td style={{ padding:"8px 14px" }}>
                          <button onClick={()=>deleteFleet(r.num)} style={{ padding:"6px 12px", background:"#ef4444", color:"#fff", border:"none", borderRadius:6, fontSize:11, fontWeight:700, cursor:"pointer" }}>삭제</button>
                        </td>
                      </tr>;
                    })}
                  </tbody>
                </table>
              </div>}
            </div>
          </div>;
        })()}

        {/* ── DOKCHOK (미입금 자동 독촉 SMS) ── */}
        {tab==="dokchok" && <DokchokTab sb={supabaseClient} contracts={contracts} isMobile={isMobile} userMode={userMode} />}

        {/* ── TRASH ── */}
        {tab==="trash" && <div>
          <div style={{ marginBottom:18, display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:8 }}>
            <div>
              <h3 style={{ margin:0, fontSize:18, color:"#18181b" }}>🗑 휴지통</h3>
              <div style={{ fontSize:13, color:"#0f172a", marginTop:6 }}>삭제된 계약 {deletedContractsView.length}건 · [복구] 원래대로 / [영구삭제] 복구불가</div>
            </div>
            {deletedContractsView.length > 0 && (
              <button onClick={()=>doEmptyTrash(deletedContractsView.map(c=>c.id))}
                style={{padding:"8px 16px",background:"#fef2f2",color:"#991b1b",border:"1px solid #fecaca",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                🗑 휴지통 비우기 ({deletedContractsView.length}건)
              </button>
            )}
          </div>
          {deletedContractsView.length === 0 ? <div style={{padding:60,textAlign:"center",color:"#0f172a",fontSize:14,background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:12}}>휴지통이 비어있습니다.</div> :
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {deletedContractsView.slice().sort((a,b)=>(b.deletedAt||"").localeCompare(a.deletedAt||"")).map(c => (
              <div key={c.id} style={{ background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:10, padding: isMobile ? "10px 12px" : "14px 16px", display:"flex", flexDirection: isMobile ? "column" : "row", justifyContent: isMobile ? "flex-start" : "space-between", alignItems: isMobile ? "stretch" : "center", gap: isMobile ? 10 : 14 }}>
                <div style={{ minWidth:0, flex:"1 1 auto" }}>

  );
}
